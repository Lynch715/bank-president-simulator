<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>银行风云：行长模拟器</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-soft: #eef3f8;
      --ink: #142033;
      --muted: #667389;
      --line: #d9e1ea;
      --blue: #1f5f8b;
      --blue-strong: #16476a;
      --gold: #b27612;
      --green: #147a62;
      --red: #a5362b;
      --orange: #b45309;
      --shadow: 0 8px 22px rgba(28, 43, 64, 0.08);
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .home {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
      background:
        linear-gradient(180deg, #ffffff 0%, #f2f6fa 56%, #edf4ef 100%);
    }

    .home-inner {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }

    .case-file {
      margin-top: 18px;
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .seal {
      width: 54px;
      height: 54px;
      flex: 0 0 auto;
    }

    .eyebrow {
      margin: 0;
      color: var(--gold);
      font-size: 13px;
      font-weight: 800;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 12px;
      font-size: clamp(30px, 9vw, 52px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .briefing {
      margin: 0 0 18px;
      color: #334258;
      line-height: 1.8;
      font-size: 16px;
    }

    .home-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 18px 0 14px;
    }

    .disclaimer {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
      margin: 0;
    }

    .main-shell {
      min-height: 100vh;
      padding-bottom: max(18px, env(safe-area-inset-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 12px 10px;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .title-stack {
      min-width: 0;
    }

    .game-title {
      margin: 0;
      font-size: 17px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .week-line {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .status-cell {
      padding: 8px 6px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 0;
    }

    .status-label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-value {
      display: block;
      margin-top: 2px;
      font-size: 14px;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .content {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric-card,
    .action-card,
    .staff-card,
    .outlet-card,
    .report-card,
    .log-row,
    .save-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 3px 12px rgba(28, 43, 64, 0.04);
    }

    .metric-card {
      padding: 12px;
      min-width: 0;
    }

    .metric-name {
      color: var(--muted);
      font-size: 12px;
    }

    .metric-value {
      margin-top: 4px;
      font-size: 21px;
      font-weight: 900;
    }

    .metric-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      min-height: 16px;
    }

    .tabs,
    .category-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 10px;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar,
    .category-tabs::-webkit-scrollbar {
      display: none;
    }

    .tab-button,
    .category-button {
      flex: 0 0 auto;
      min-height: 38px;
      padding: 0 12px;
      border-radius: 8px;
      color: var(--ink);
      background: #e9eef4;
      border: 1px solid var(--line);
      font-weight: 750;
      white-space: nowrap;
    }

    .tab-button.active,
    .category-button.active {
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .panel-title-row {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 10px;
      margin: 6px 0 10px;
    }

    .panel-title-row h2 {
      margin: 0;
      font-size: 20px;
    }

    .panel-meta {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .action-card,
    .staff-card,
    .outlet-card,
    .report-card,
    .save-card {
      padding: 12px;
    }

    .item-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .item-title {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
    }

    .item-subtitle {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eef3f8;
      color: #334258;
      border: 1px solid #dce4ee;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.gold {
      background: #fff4dc;
      color: #7a4f05;
      border-color: #efd39b;
    }

    .badge.green {
      background: #e8f5ef;
      color: #11624f;
      border-color: #b7dfd2;
    }

    .badge.red {
      background: #fff0ed;
      color: #8d2d24;
      border-color: #efc7c1;
    }

    .badge.orange {
      background: #fff5e9;
      color: #8a4308;
      border-color: #f0d0a8;
    }

    .badge.blue {
      background: #e9f1f8;
      color: #1f5f8b;
      border-color: #bcd5e8;
    }

    .item-body {
      margin: 8px 0 0;
      color: #34445a;
      font-size: 13px;
      line-height: 1.65;
    }

    .item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .item-actions .btn {
      flex: 1 1 auto;
      min-width: 84px;
    }

    .btn small {
      font-weight: 700;
      font-size: 11px;
      opacity: 0.72;
      margin-left: 3px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      min-height: 38px;
      padding: 0 12px;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font-weight: 850;
      white-space: nowrap;
      border: 1px solid var(--blue);
    }

    .btn.secondary {
      color: var(--blue-strong);
      background: #eef5fa;
      border-color: #c9dbe8;
    }

    .btn.ghost {
      color: var(--ink);
      background: #fff;
      border-color: var(--line);
    }

    .btn.danger {
      color: #fff;
      background: var(--red);
      border-color: var(--red);
    }

    .btn.warning {
      color: #fff;
      background: var(--orange);
      border-color: var(--orange);
    }

    .btn.icon {
      width: 38px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }

    .inline-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .tiny-stat {
      min-width: 0;
      padding: 8px;
      border-radius: 8px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
    }

    .tiny-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .tiny-stat strong {
      display: block;
      margin-top: 2px;
      font-size: 14px;
    }

    .risk-grid {
      display: grid;
      gap: 8px;
    }

    .risk-row {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .risk-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-weight: 850;
    }

    .risk-track {
      height: 8px;
      margin-top: 8px;
      background: #e8edf3;
      border-radius: 999px;
      overflow: hidden;
    }

    .risk-fill {
      height: 100%;
      width: 20%;
      background: var(--green);
    }

    .risk-fill.mid {
      background: var(--gold);
    }

    .risk-fill.high {
      background: var(--red);
    }

    .log-row {
      padding: 10px;
    }

    .log-row strong {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .log-row p {
      margin: 0;
      color: #3c4d63;
      font-size: 13px;
      line-height: 1.55;
    }

    .empty {
      padding: 24px 12px;
      color: var(--muted);
      text-align: center;
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 12px;
      background: rgba(12, 20, 32, 0.48);
    }

    .modal-backdrop.hidden {
      display: none;
    }

    .modal {
      width: min(640px, 100%);
      max-height: min(82vh, 720px);
      overflow: auto;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--line);
      box-shadow: 0 18px 60px rgba(10, 18, 30, 0.26);
    }

    .modal-head {
      padding: 14px 14px 8px;
      border-bottom: 1px solid var(--line);
    }

    .modal-title {
      margin: 0;
      font-size: 19px;
    }

    .modal-body {
      padding: 14px;
      color: #334258;
      line-height: 1.7;
    }

    .modal-options {
      display: grid;
      gap: 8px;
      padding: 0 14px 14px;
    }

    .option-btn {
      width: 100%;
      padding: 11px 12px;
      text-align: left;
      color: var(--ink);
      background: #f4f7fa;
      border: 1px solid var(--line);
      border-radius: 8px;
      line-height: 1.55;
      font-weight: 750;
    }

    .option-btn small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-weight: 500;
    }

    .ending {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
      background: linear-gradient(180deg, #f8fbff 0%, #edf4ef 100%);
    }

    .ending-box {
      max-width: 720px;
      width: 100%;
      padding: 18px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .ending-title {
      margin-bottom: 10px;
      font-size: clamp(28px, 8vw, 44px);
      line-height: 1.12;
    }

    .ending-copy {
      color: #334258;
      line-height: 1.8;
      margin-bottom: 14px;
    }

    .screen:not(.active) {
      display: none !important;
    }

    @media (min-width: 760px) {
      .home {
        padding-left: 32px;
        padding-right: 32px;
      }

      .case-file {
        padding: 26px;
      }

      .home-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .status-strip {
        grid-template-columns: repeat(8, minmax(0, 1fr));
      }

      .metric-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .content {
        padding: 16px;
      }

      .action-layout {
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr);
        gap: 12px;
      }

      .category-tabs {
        display: grid;
        align-content: start;
        padding-top: 0;
      }

      .category-button {
        width: 100%;
        text-align: left;
      }

      .list.staff-list,
      .list.outlet-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .risk-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .modal-backdrop {
        align-items: center;
      }
    }

    @media (min-width: 1040px) {
      .metric-grid {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .list.staff-list,
      .list.outlet-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    .flash-wrap {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      width: min(560px, calc(100% - 24px));
      z-index: 60;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .flash-card {
      pointer-events: auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 4px solid var(--blue);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 12px 14px;
      animation: flashIn 0.22s ease-out;
      cursor: pointer;
    }

    .flash-card.fading {
      animation: flashOut 0.4s ease-in forwards;
    }

    .flash-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .flash-narr {
      font-size: 12.5px;
      color: var(--muted);
      margin-bottom: 6px;
      line-height: 1.45;
    }

    .flash-deltas {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .flash-chip {
      font-size: 12px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
    }

    .rank-summary {
      margin-top: 8px;
      padding: 9px 13px;
      background: var(--surface-soft);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
    }

    .rank-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }

    .rank-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 13px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .rank-row.me {
      border-color: var(--blue);
      background: var(--surface-soft);
      box-shadow: inset 0 0 0 1px var(--blue);
    }

    .rk-num {
      flex: 0 0 30px;
      height: 30px;
      width: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      background: var(--surface-soft);
      color: var(--muted);
    }

    .rk-num.top {
      background: #fff4dc;
      color: #7a4f05;
    }

    .rk-main { flex: 1; min-width: 0; }
    .rk-name { font-weight: 700; font-size: 14px; color: var(--ink); }
    .rk-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .rk-score {
      font-weight: 800;
      font-size: 16px;
      color: var(--ink);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .rk-tr { font-size: 11px; }
    .rk-tr.up { color: var(--green); }
    .rk-tr.down { color: var(--red); }

    .score-breakdown {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin: 8px 0;
    }
    .sb-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      color: var(--ink);
      padding: 3px 0;
      border-bottom: 1px dashed var(--line);
    }
    .sb-label em { color: var(--muted); font-style: normal; font-size: 11px; margin-left: 2px; }
    .sb-tip { font-size: 12.5px; color: var(--ink); margin: 6px 0 0; line-height: 1.5; }

    .flash-chip.good { background: #e8f5ef; color: #11624f; }
    .flash-chip.bad { background: #fff0ed; color: #8d2d24; }
    .flash-chip.flat { background: #eef3f8; color: #51607a; }

    @keyframes flashIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes flashOut {
      to { opacity: 0; transform: translateY(8px); }
    }
  </style>
</head>
<body>
  <div id="app">
    <section id="homeScreen" class="screen home active">
      <div class="home-inner">
        <div class="case-file">
          <div class="brand-row">
            <svg class="seal" viewBox="0 0 64 64" role="img" aria-label="江北区支行任命档案标记">
              <rect x="4" y="4" width="56" height="56" rx="8" fill="#f8fbff" stroke="#1f5f8b" stroke-width="3"></rect>
              <path d="M18 42h28M18 34h28M22 26h20M24 18h16" stroke="#b27612" stroke-width="4" stroke-linecap="round"></path>
              <path d="M14 48h36" stroke="#1f5f8b" stroke-width="3" stroke-linecap="round"></path>
            </svg>
            <div>
              <p class="eyebrow">江北区支行任命档案</p>
              <p class="week-line">三年任期，156周，分行只看结果。</p>
            </div>
          </div>
          <h1>银行风云：行长模拟器</h1>
          <p class="briefing">桌上已经放着三份通报：存款倒数、不良预警、客户经理离职申请。你从分行机关调任江北区支行行长，面前是指标、队伍、人情、风险和一条随时会变窄的上升通道。</p>
          <div class="home-actions">
            <button id="newGameBtn" class="btn">新游戏</button>
            <button id="continueBtn" class="btn secondary">继续游戏</button>
          </div>
          <p class="disclaimer">本游戏所有人物、机构、项目均为虚构。经营反馈只服务于模拟体验，不对应任何现实单位。</p>
        </div>
      </div>
    </section>

    <section id="gameScreen" class="screen main-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="topline">
            <div class="title-stack">
              <p class="game-title">银行风云：行长模拟器</p>
              <p id="weekLine" class="week-line"></p>
            </div>
            <div class="top-actions">
              <button id="saveBtn" class="btn secondary" title="手动保存" aria-label="保存游戏">保存游戏</button>
              <button id="endWeekBtn" class="btn warning">结束本周</button>
            </div>
          </div>
          <div id="statusStrip" class="status-strip"></div>
        </div>
      </header>

      <main class="content">
        <div id="metricsGrid" class="metric-grid"></div>
        <nav id="tabbar" class="tabs" aria-label="游戏模块"></nav>
        <section id="panelContent"></section>
      </main>
    </section>

    <section id="endingScreen" class="screen ending">

        const text = String(input);
        let h = 2166136261;
        for (let i = 0; i < text.length; i += 1) {

          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      }

          let t = value;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

        );
      }

      // 综合分构成（让排行透明：玩家看得见分怎么来的、怎么往上爬）
      const SCORE_WEIGHTS = { deposit: 2.1, loan: 1.7, incomeRate: 0.48, nplRate: -6.4, morale: 0.12, leaderImpression: 0.1 };

      function branchScoreBreakdown(state) {
        const b = state.branch, p = state.player;
        const riskPen = round(Math.max(0, maxRisk(state) - 70) * 0.25, 1);
        return [
          { key: "deposit", label: "存款 " + round(b.deposit, 1) + "亿", weight: "×2.1", val: round(b.deposit * 2.1, 1), lever: "每 +1亿 ≈ +2.1 分" },
          { key: "loan", label: "贷款 " + round(b.loan, 1) + "亿", weight: "×1.7", val: round(b.loan * 1.7, 1), lever: "每 +1亿 ≈ +1.7 分" },
          { key: "incomeRate", label: "收入完成率 " + round(b.incomeRate, 0) + "%", weight: "×0.48", val: round(b.incomeRate * 0.48, 1), lever: "每 +1% ≈ +0.48 分" },
          { key: "nplRate", label: "不良率 " + round(b.nplRate, 1) + "%", weight: "×-6.4", val: -round(b.nplRate * 6.4, 1), lever: "每降 1% ≈ +6.4 分" },
          { key: "morale", label: "员工士气 " + round(b.morale, 0), weight: "×0.12", val: round(b.morale * 0.12, 1), lever: "每 +10 ≈ +1.2 分" },
          { key: "leaderImpression", label: "领导印象 " + round(p.leaderImpression, 0), weight: "×0.1", val: round(p.leaderImpression * 0.1, 1), lever: "每 +10 ≈ +1 分" },
          { key: "risk", label: "风险拖累（最高项超70部分）", weight: "扣分", val: -riskPen, lever: riskPen > 0 ? "把最高风险压到70以下可止损" : "暂未扣分" }
        ];
      }

      function getRanking(state) {
        const rows = (Array.isArray(state.competitors) ? state.competitors : []).map((c) => ({
          id: c.id, name: c.name, director: c.director, style: c.style,
          score: round(c.score, 1), trend: c.trend || 0, status: c.status || "正常", isPlayer: false
        }));
        rows.push({
          id: "player", name: "江北区支行", director: "你", style: getDominantRouteKey(state),
          score: computeBranchScore(state), trend: state.branch.rankTrend || 0, status: "正常", isPlayer: true
        });
        rows.sort((a, b) => b.score - a.score);
        rows.forEach((row, index) => { row.rank = index + 1; });
        return rows;
      }

      function getDominantRouteKey(state) {
        const labels = { reform: "清流改革", relation: "资源关系", wolf: "狼性冲刺", gray: "灰色江湖", official: "官场表演", survive: "摆烂苟活" };
        const key = Object.keys(state.routeScores || {}).sort((a, b) => state.routeScores[b] - state.routeScores[a])[0];
        return labels[key] || "未定";
      }

      function evolveCompetitors(state) {
        if (!Array.isArray(state.competitors)) state.competitors = createCompetitors();
        const prevRank = state.branch.rank;
        state.competitors.forEach((c) => {
          const cfg = COMPETITOR_STYLE[c.style] || COMPETITOR_STYLE["稳健"];
          c.prevScore = c.score;
          c.status = "正常";
          let delta = cfg.growth * (0.7 + Math.random() * 0.7);
          if (Math.random() < cfg.vol) {
            if (Math.random() < cfg.crash) {
              // 爆雷崩盘：给玩家反超机会
              const loss = c.score * (0.08 + Math.random() * 0.12);
              c.score -= loss;
              c.status = "爆雷";
              delta = 0;
              if (Math.random() < 0.5) {
                addLog(state, "对手爆雷", c.name + "（" + c.director + "）出了事，排名往下栽。江北这边，机会窗口开了一条缝。", "rival");
                state.branch.customerOpportunities += 2;
                state.branch.loanOpportunities += 1;
              }
            } else {
              delta *= 1.6; // 大单落地，冲一波
              c.status = "猛冲";
            }
          }
          c.score = Math.max(20, round(c.score + delta, 1));
          c.trend = c.score > c.prevScore + 0.4 ? 1 : (c.score < c.prevScore - 0.4 ? -1 : 0);
        });
        updateRank(state);
        state.branch.rankTrend = prevRank > state.branch.rank ? 1 : (prevRank < state.branch.rank ? -1 : 0);
      }

      // ===== 社交：点选人物 + 好感 =====
      const SOCIAL_ACTIONS = {
        customer_party: { groups: ["重点客户", "政府条线"], style: "正式", baseGain: 5, bonus: "client" },
        buy_gifts: { groups: ["重点客户", "政府条线"], style: "送礼", baseGain: 6, bonus: "client" },
        business_dinner: { groups: ["政府条线", "重点客户"], style: "酒局", baseGain: 7, bonus: "relation" },
        report_leader: { groups: ["分行领导"], style: "正式", baseGain: 6, bonus: "leader" },
        request_salary: { groups: ["分行领导"], style: "正式", baseGain: 4, bonus: "leader", preferred: "contact_branch_hr" },
        request_marketing_budget: { groups: ["分行领导"], style: "正式", baseGain: 4, bonus: "leader", preferred: "contact_branch_president" },
        request_credit: { groups: ["分行领导"], style: "正式", baseGain: 4, bonus: "leader", preferred: "contact_branch_credit" },
        special_policy: { groups: ["分行领导"], style: "正式", baseGain: 4, bonus: "leader", preferred: "contact_branch_president" },
        visit_government: { groups: ["政府条线"], style: "务实", baseGain: 6, bonus: "relation" },
        visit_finance_bureau: { fixed: "contact_gov_finance", style: "务实", baseGain: 7, bonus: "relation" },
        visit_housing: { fixed: "contact_gov_housing", style: "务实", baseGain: 7, bonus: "relation" },
        visit_hrss: { fixed: "contact_gov_hrss", style: "务实", baseGain: 7, bonus: "relation" },
        visit_medical: { fixed: "contact_gov_medical", style: "务实", baseGain: 7, bonus: "relation" },
        visit_education: { fixed: "contact_gov_education", style: "务实", baseGain: 7, bonus: "relation" },
        visit_state_company: { fixed: "contact_gov_soequity", style: "务实", baseGain: 7, bonus: "client" },
        gift_bribe: { groups: ["政府条线", "重点客户", "分行领导"], style: "送礼灰", baseGain: 9, bonus: "gray" },
        drunk_social: { groups: ["政府条线", "重点客户"], style: "酒局灰", baseGain: 8, bonus: "gray" },
        benefit_transfer: { groups: ["政府条线", "重点客户", "分行领导"], style: "送礼灰", baseGain: 10, bonus: "gray" }
      };

      function isSocialAction(actionId) {
        return Object.prototype.hasOwnProperty.call(SOCIAL_ACTIONS, actionId);
      }

      function socialContactsFor(state, actionId) {
        const cfg = SOCIAL_ACTIONS[actionId];
        if (!cfg) return [];
        ensureOrgStructure(state);
        if (cfg.fixed) return state.contacts.filter((c) => c.id === cfg.fixed);
        return state.contacts
          .filter((c) => cfg.groups.indexOf(c.group) >= 0)
          .sort((a, b) => b.favor - a.favor);
      }

      function socialPrefMod(style, contact) {
        const p = contact.preferences || [];
        const has = (t) => p.indexOf(t) >= 0;
        const isWine = style.indexOf("酒局") >= 0;
        const isGift = style.indexOf("送礼") >= 0;
        const isGray = style.indexOf("灰") >= 0;
        const isFormal = style === "正式" || style === "务实";
        let mult = 1, favorMult = 1, risk = null, tag = "如常";
        if (isWine) {
          if (has("爱喝酒")) { mult = 1.35; favorMult = 1.4; tag = "投其所好"; }
          else if (has("厌恶酒局")) { mult = 0.4; favorMult = -0.8; tag = "踩到雷区"; }
        }
        if (isGift && (has("重人情") || has("要面子"))) { mult = Math.max(mult, 1.25); favorMult = Math.max(favorMult, 1.3); tag = "对路子"; }
        if (isFormal) {
          if (has("重规矩") || has("看方案") || has("看服务") || has("看产品")) { mult = 1.2; favorMult = 1.2; tag = "对路子"; }
          if (has("爱喝酒")) { mult = Math.min(mult, 0.95); }
        }
        if (has("要面子") && (isGift || isFormal)) { mult += 0.1; favorMult += 0.1; }
        if (isGray) {
          if (contact.riskTolerance >= 50) { mult = Math.max(mult, 1.25); favorMult = Math.max(favorMult, 1.4); risk = { integrity: 2 }; tag = "心照不宣"; }
          else if (has("重规矩") || has("厌恶酒局") || has("重稳定") || has("看服务")) { mult = 0.45; favorMult = -1.1; risk = { integrity: 7, compliance: 4 }; tag = "碰了硬钉子"; }
          else { favorMult = Math.max(favorMult, 1.2); risk = { integrity: 3 }; }
        }
        return { mult: Math.max(0, mult), favorMult: favorMult, risk: risk, tag: tag };
      }

      function socialBonusDelta(bonus, power) {
        if (bonus === "relation") return { branch: { deposit: round(0.55 * power, 2), localRelation: round(3.2 * power, 1), governmentProjects: power > 0.9 ? 1 : 0, customerOpportunities: Math.round(1.5 * power) } };
        if (bonus === "client") return { branch: { deposit: round(0.42 * power, 2), loan: round(0.26 * power, 2), customerOpportunities: Math.round(2 * power), loanOpportunities: power > 0.8 ? 1 : 0 } };
        if (bonus === "leader") return { player: { leaderImpression: round(3.2 * power, 1), pressure: -1 }, hiddenRisks: { leaderAttention: -1 } };
        if (bonus === "gray") return { branch: { deposit: round(0.8 * power, 2), loan: round(0.45 * power, 2), incomeRate: round(1.6 * power, 1), localRelation: round(2 * power, 1) } };
        return {};
      }

      function applySocialAction(state, actionId, contactId) {
        const action = getActionById(actionId);
        const cfg = SOCIAL_ACTIONS[actionId];
        if (!action || !cfg) return { ok: false, message: "行动不存在。" };
        if (state.flags.ended || state.ending) return { ok: false, message: "任期已经结束。" };
        if (state.actionPoints < action.cost) return { ok: false, message: "行动点不足。" };
        if ((action.budgetCost || 0) > state.branch.marketingBudget) return { ok: false, message: "经营成本不足。" };
        const contact = state.contacts.find((c) => c.id === contactId);
        if (!contact) return { ok: false, message: "没有选择对象。" };
        state.actionPoints -= action.cost;
        state.branch.marketingBudget -= action.budgetCost || 0;
        if (action.route) state.routeScores[action.route] = (state.routeScores[action.route] || 0) + 1;
        const favorBefore = contact.favor;
        // 基础效果（沿用行动自身数值，但屏蔽其默认日志）
        const base = effectFromObject(action.effect)(state);
        if (base) base.log = null;
        applyEffect(state, base, action.name);
        // 一次次接触，才慢慢摸清这个人（要积累不少次才看得透）
        const pref = socialPrefMod(cfg.style, contact);
        if (!state.contactIntel) state.contactIntel = {};
        state.contactIntel[contact.id] = (state.contactIntel[contact.id] || 0) + 1;
        let preferredBoost = 1;
        if (cfg.preferred && cfg.preferred === contact.id) preferredBoost = 1.35;
        const power = Math.max(0, (0.5 + contact.favor / 100) * pref.mult * preferredBoost);
        applyEffect(state, socialBonusDelta(cfg.bonus, power), action.name);
        if (pref.risk) addDelta(state.hiddenRisks, pref.risk);
        const favorDelta = Math.round(cfg.baseGain * pref.favorMult);
        adjustContactFavor(state, contact.id, favorDelta);
        // 好感跨档解锁提示
        const crossed = favorBefore < 60 && contact.favor >= 60;
        const favorText = favorDelta >= 0 ? "好感+" + favorDelta : "好感" + favorDelta;
        let log = "你对" + contact.name + "（" + contact.title + "）" + action.name + "，" + pref.tag + "，" + favorText + "（现" + contact.favor + "）。";
        if (crossed) log += " 关系进入熟络，专属资源开始向你倾斜。";
        if (cfg.preferred && cfg.preferred === contact.id) log += " 找对了人，事半功倍。";
        addLog(state, action.name + "·" + contact.name, log, "social");
        if (action.reveals) revealRisk(state, action.reveals);
        maybeQueueActionEvent(state, action);
        clampState(state);
        saveGame(state, true);
        return { ok: true, contact: contact, favorDelta: favorDelta, crossed: crossed };
      }

      function ensureOrgStructure(state) {
        if (!state) return;
        if (!Array.isArray(state.positionSlots)) {
          state.positionSlots = createPositionSlots();
        }
        if (!Array.isArray(state.contacts)) {
          state.contacts = createContacts();
        }
        state.positionSlots.forEach((slot) => {
          if (typeof slot.employeeId === "undefined") slot.employeeId = null;
        });
        state.employees.forEach((employee) => {
          if (typeof employee.slotId === "undefined") employee.slotId = null;
          if (!employee.assignmentStatus) employee.assignmentStatus = employee.slotId ? "在编" : "在岗";
          if (employee.assignmentStatus === "在编" && !employee.slotId) employee.assignmentStatus = "在岗";
        });
        const slotIds = new Set(state.positionSlots.map((slot) => slot.id));
        state.employees.forEach((employee) => {
          if (employee.slotId && !slotIds.has(employee.slotId)) {
            employee.slotId = null;
            employee.assignmentStatus = isManagedRole(employee.role) ? "待岗" : "在岗";
          }
        });
        state.positionSlots.forEach((slot) => {
          if (slot.employeeId && !state.employees.some((employee) => employee.id === slot.employeeId)) {
            slot.employeeId = null;
          }
        });
        state.positionSlots.forEach((slot) => {
          if (!slot.employeeId) return;
          const employee = getEmployeeById(state, slot.employeeId);
          if (!employee) return;
          employee.slotId = slot.id;
          employee.role = slot.role;
          employee.assignmentStatus = "在编";
          employee.status = employee.status === "待岗" ? "正常" : employee.status;
          if (slot.outlet) employee.outlet = slot.outlet;
          if (slot.department && !slot.outlet) employee.outlet = slot.department;
        });
        state.positionSlots.forEach((slot) => {
          if (slot.employeeId) return;
          const employee = state.employees.find((item) => item.role === slot.role && !item.slotId && item.assignmentStatus !== "待岗");
          if (!employee) return;
          slot.employeeId = employee.id;
          employee.slotId = slot.id;
          employee.assignmentStatus = "在编";
          employee.status = employee.status === "待岗" ? "正常" : employee.status;
          if (slot.outlet) employee.outlet = slot.outlet;
          if (slot.department && !slot.outlet) employee.outlet = slot.department;
        });
        state.employees.forEach((employee) => {
          if (employee.slotId) return;
          if (employee.assignmentStatus === "待岗") return;
          employee.assignmentStatus = isManagedRole(employee.role) ? "待岗" : "在岗";
        });
      }

      function promoteEmployeeToSlot(state, employeeId, slotId) {
        ensureOrgStructure(state);
        const employee = getEmployeeById(state, employeeId);
        const slot = getSlotById(state, slotId);
        if (!employee) return { ok: false, message: "员工不存在。" };
        if (!slot || !slot.managed) return { ok: false, message: "岗位不存在。" };
        if (slot.employeeId) return { ok: false, message: "这个岗位已有人，必须先免职、降职或解聘腾位。" };
        if (employee.slotId) {
          const oldSlot = getSlotById(state, employee.slotId);
          if (oldSlot) oldSlot.employeeId = null;
        }
        const oldRole = employee.role;
        slot.employeeId = employee.id;
        employee.previousRole = oldRole;
        employee.role = slot.role;
        employee.slotId = slot.id;
        employee.assignmentStatus = "在编";
        employee.status = "正常";
        employee.loyalty = clamp(employee.loyalty + 8, 0, 100);
        employee.ambition = clamp(employee.ambition + 2, 0, 100);
        const payBand = { 1: 42, 2: 30, 3: 18 }[slot.level] || employee.salary;
        employee.salary = Math.round(Math.max(employee.salary + 2, payBand));
        if (slot.outlet) employee.outlet = slot.outlet;
        if (slot.department && !slot.outlet) employee.outlet = slot.department;
        state.branch.morale += 1;
        state.branch.teamAbility += employee.management > 62 || employee.marketing > 72 ? 2 : 0;
        state.hiddenRisks.employee += Math.max(0, 2 - Math.round(employee.loyalty / 50));
        addLog(state, "干部任命", employee.name + "从" + oldRole + "调整为" + slot.title + "。位子有人坐了，走廊里的算盘也重新响了一遍。", "staff");
        clampState(state);
        return { ok: true, employeeId: employee.id, slotId: slot.id };
      }

      function demoteEmployeeFromSlot(state, employeeId) {
        ensureOrgStructure(state);
        const employee = getEmployeeById(state, employeeId);
        if (!employee) return { ok: false, message: "员工不存在。" };
        if (!employee.slotId) return { ok: false, message: "这个员工没有占用管理岗位。" };
        const slot = getSlotById(state, employee.slotId);
        const title = slot ? slot.title : employee.role;
        if (slot) slot.employeeId = null;
        employee.previousRole = employee.role;
        employee.role = "待岗干部";
        employee.slotId = null;
        employee.assignmentStatus = "待岗";
        employee.status = "待岗";
        employee.loyalty = clamp(employee.loyalty - 14, 0, 100);
        state.branch.morale -= 5;
        state.hiddenRisks.employee += 10;
        state.hiddenRisks.publicOpinion += 2;
        addLog(state, "免职腾位", employee.name + "被免去" + title + "，转入待岗。空位腾出来了，代价也开始计息。", "staff");
        clampState(state);
        return { ok: true, employeeId: employee.id, slotId: slot ? slot.id : null };
      }

      function recruitCandidate(state, poolIndex, options) {
        ensureOrgStructure(state);
        const config = options || {};
        const index = Number(poolIndex || 0);
        const candidate = state.employeePool[index];
        if (!candidate) return { ok: false, message: "候选池暂时没有合适的人。" };
        const signingCost = Math.round(candidate.expectedSalary * 0.5);
        if (state.branch.salaryPool < signingCost) return { ok: false, message: "工资池不够支付安家费，招不进来。" };
        let slot = null;
        if (config.slotId) {
          slot = getSlotById(state, config.slotId);
          if (!slot || slot.employeeId) return { ok: false, message: "目标岗位没有空缺。" };
        } else {
          slot = getOpenSlots(state, candidate.role)[0] || null;
        }
        if (!slot && !config.allowIdle) {
          return { ok: false, message: "没有对应空缺。确认招聘的话，此人会进入待岗并持续消耗工资池。" };
        }
        const hired = JSON.parse(JSON.stringify(candidate));
        hired.id = "emp_hired_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
        hired.slotId = null;
        hired.assignmentStatus = "待岗";
        hired.status = "待岗";
        hired.salary = Math.max(hired.salary || 0, candidate.expectedSalary);
        state.employeePool.splice(index, 1);
        state.employees.push(hired);
        state.branch.salaryPool -= signingCost;
        if (slot) {
          promoteEmployeeToSlot(state, hired.id, slot.id);
          addLog(state, "招聘上岗", "你招入了" + hired.name + "，直接补入" + slot.title + "。", "staff");
        } else {
          state.branch.morale -= 1;
          state.hiddenRisks.employee += 3;
          addLog(state, "招聘待岗", "你招入了" + hired.name + "，但没有空缺，只能先待岗。工资照发，议论也照起。", "staff");
        }
        clampState(state);
        return { ok: true, employeeId: hired.id, idle: !slot, slotId: slot ? slot.id : null, message: slot ? "招聘并上岗成功。" : "招聘成功，此人进入待岗。" };
      }

      function applyIdleStaffPressure(state) {
        ensureOrgStructure(state);
        const idleEmployees = getIdleEmployees(state);
        if (!idleEmployees.length) return { ok: true, count: 0 };
        // 钱由月度发薪统一扣；这里只反映待岗带来的士气与队伍压力
        state.branch.morale -= Math.min(4, idleEmployees.length * 0.8);
        state.hiddenRisks.employee += Math.min(12, idleEmployees.length * 2.2);
        if (state.week % 4 === 0) {
          addLog(state, "待岗人员压力", idleEmployees.length + "名待岗人员工资照发，活却没干，队伍里开始有闲话。没人闲着的时候最安静，有人闲着的时候最会传话。", "staff");
        }
        clampState(state);
        return { ok: true, count: idleEmployees.length };
      }

      // ===== 薪资 / 工资总额 =====
      function monthlySalary(annual) {
        return round((annual || 0) / 12, 1);
      }

      function monthlyPayroll(state) {
        if (!Array.isArray(state.employees)) return 0;
        return round(state.employees.reduce((sum, e) => sum + Math.max(0.5, (e.salary || 12) / 12), 0), 1);
      }

      function processPayroll(state) {
        const due = monthlyPayroll(state);
        if (state.branch.salaryPool >= due) {
          state.branch.salaryPool -= due;
          return { ok: true, due: due, shortfall: 0 };
        }
        // 工资池见底：发不出全额工资
        const shortfall = round(due - Math.max(0, state.branch.salaryPool), 1);
        state.branch.salaryPool = 0;
        state.branch.morale -= Math.min(12, 4 + shortfall / 12);
        state.hiddenRisks.employee += Math.min(20, 6 + shortfall / 10);
        state.player.pressure += 4;
        // 欠薪可能逼走忠诚度最低的在编骨干
        if (Math.random() < 0.5) {
          const leaver = state.employees
            .filter((e) => e.slotId && e.role !== "副行长")
            .sort((a, b) => a.loyalty - b.loyalty)[0];
          if (leaver) {
            if (leaver.slotId) { const sl = getSlotById(state, leaver.slotId); if (sl) sl.employeeId = null; }
            state.employees = state.employees.filter((e) => e.id !== leaver.id);
            state.flags.staffDepartures += 1;
            addLog(state, "欠薪流失", "工资池见底，" + leaver.name + "没等到这个月的工资条就走了。钱的问题，最后都是人的问题。", "staff");
          }
        }
        addLog(state, "工资发不全", "本月工资总额缺口约" + asMoney(shortfall) + "，只能先欠着。队伍的脸色，比报表更难看。", "staff");
        return { ok: false, due: due, shortfall: shortfall };
      }

      function openOutletCost(state) {
        const n = Array.isArray(state.outlets) ? state.outlets.length : 3;

      function availableOutletLocations(state) {
        const opened = new Set((state.outlets || []).map((o) => o.name));
        return OUTLET_LOCATIONS.filter((l) => !opened.has(l.name));
      }

      function openOutlet(state, locId) {
        ensureOrgStructure(state);
        if (state.outlets.length >= OUTLET_CAP) return { ok: false, message: "网点数量已到上限（" + OUTLET_CAP + "个）。" };
        const loc = OUTLET_LOCATIONS.find((l) => l.id === locId);
        if (!loc) return { ok: false, message: "没有这个选址。" };
        if (state.outlets.some((o) => o.name === loc.name)) return { ok: false, message: "该网点已经开设。" };
        const setup = openOutletCost(state);
        if (state.branch.marketingBudget < setup) return { ok: false, message: "开办费不够，需" + asMoney(setup) + "经营成本。" };
        state.branch.marketingBudget -= setup;
        const oid = "outlet_new_" + Date.now() + "_" + Math.floor(Math.random() * 1000);
        state.outlets.push({

        clampState(state);
        return { ok: true, outletId: oid, message: "新网点已开设，进入爬坡期。" };
      }

      // ===== 网点：主增长引擎 =====
      function getOutletManager(state, outlet) {
        if (!Array.isArray(state.positionSlots)) return null;
        const slot = state.positionSlots.find((s) => s.outlet === outlet.name && s.employeeId);
        return slot ? getEmployeeById(state, slot.employeeId) : null;
      }

      function outletWeeklyOutput(state, outlet) {
        const manager = getOutletManager(state, outlet);
        const mgrF = manager ? 0.6 + (manager.management / 100) * 0.7 : 0.5;
        const abilityF = (outlet.ability || 0) / 100;
        const custF = 0.4 + ((outlet.customerBase || 0) / 100) * 0.8;
        const locF = 0.55 + ((outlet.locationPotential || 0) / 100) * 0.55;
        const moraleF = 0.7 + ((outlet.morale || 0) / 100) * 0.5;
        const ramp = outlet.ramp == null ? 1 : outlet.ramp;
        const dep = 0.3 * abilityF * custF * locF * mgrF * moraleF * ramp;
        return { deposit: round(dep, 3), loan: round(dep * 0.62, 3), income: round(dep * 1.5, 3), manager: manager };
      }

      function branchOutletOutput(state) {
        if (!Array.isArray(state.outlets)) return { deposit: 0, loan: 0 };
        let d = 0, l = 0;
        state.outlets.forEach((o) => { const out = outletWeeklyOutput(state, o); d += out.deposit; l += out.loan; });
        return { deposit: round(d, 2), loan: round(l, 2) };
      }

      function processOutlets(state) {
        if (!Array.isArray(state.outlets)) return;
        let totalDep = 0, totalLoan = 0, totalIncome = 0;
        state.outlets.forEach((o) => {
          if (o.ramp == null) o.ramp = 1;
          if (o.ramp < 1) o.ramp = Math.min(1, round(o.ramp + 0.03, 3));
          // 不维护就慢慢退坡
          o.morale = clamp(round(o.morale - 0.3, 1), 0, 100);
          o.customerBase = clamp(round(o.customerBase - 0.08, 1), 0, 100);
          const out = outletWeeklyOutput(state, o);
          o.deposit = round((o.deposit || 0) + out.deposit, 3);
          o.loan = round((o.loan || 0) + out.loan, 3);
          totalDep += out.deposit; totalLoan += out.loan; totalIncome += out.income;
        });
        state.branch.deposit += round(totalDep, 3);
        state.branch.loan += round(totalLoan, 3);
        state.branch.incomeRate += round(totalIncome, 3);
      }

      function addDelta(target, delta) {
        if (!delta) return;
        Object.keys(delta).forEach((key) => {
          const value = delta[key];
          if (typeof value === "number") {
            target[key] = (target[key] || 0) + value;
          } else if (value && typeof value === "object" && !Array.isArray(value)) {
            target[key] = target[key] || {};
            addDelta(target[key], value);
          } else {
            target[key] = value;
          }
        });
      }

      function clampState(state) {
        if (state.employees) ensureOrgStructure(state);
        state.week = clamp(Math.round(state.week), 1, TOTAL_WEEKS);
        state.year = Math.min(3, Math.ceil(state.week / 52));
        state.actionPoints = clamp(Math.round(state.actionPoints), 0, BASE_ACTION_POINTS);
        Object.keys(state.branch).forEach((key) => {
          if (typeof state.branch[key] !== "number") return;
          if (["deposit", "loan"].includes(key)) state.branch[key] = Math.max(0, round(state.branch[key], 2));
          else if (key === "nplRate") state.branch[key] = clamp(round(state.branch[key], 2), 0.2, 15);
          else if (key === "salaryPool") state.branch[key] = clamp(round(state.branch[key], 1), 0, 2000);
          else if (key === "marketingBudget") state.branch[key] = clamp(round(state.branch[key], 1), 0, 500);
          else if (key === "rank" || key === "lastRank") state.branch[key] = clamp(Math.round(state.branch[key]), 1, 9);
          else if (key === "rankTrend") state.branch[key] = clamp(Math.round(state.branch[key]), -1, 1);
          else state.branch[key] = clamp(round(state.branch[key], 1), 0, 100);
        });
        Object.keys(state.player).forEach((key) => {
          state.player[key] = clamp(round(state.player[key], 1), 0, 100);
        });
        Object.keys(state.hiddenRisks).forEach((key) => {
          state.hiddenRisks[key] = clamp(round(state.hiddenRisks[key], 1), 0, 100);
        });
        updateRank(state);
      }

      function updateRank(state) {
        if (!Array.isArray(state.competitors) || !state.competitors.length) {
          state.branch.rank = clamp(Math.round(state.branch.rank || 6), 1, 9);
          return;
        }
        const playerScore = computeBranchScore(state);
        let rank = 1;
        state.competitors.forEach((c) => { if (c.score > playerScore) rank += 1; });
        state.branch.rank = clamp(rank, 1, state.competitors.length + 1);
      }

      function maxRisk(state) {
        return Math.max.apply(null, Object.values(state.hiddenRisks));
      }

      function revealRisk(state, keys) {
        if (!state.riskIntel) state.riskIntel = {};
        (keys || []).forEach((key) => {
          if (Object.prototype.hasOwnProperty.call(state.hiddenRisks, key)) {
            state.riskIntel[key] = state.week + REVEAL_WEEKS;
          }
        });
      }

      function isRiskVisible(state, key) {
        if (key === "health") return true; // 自己的身体，一直有数
        if (!state.riskIntel) return false;
        return (state.riskIntel[key] || 0) >= state.week;
      }

      function riskIntelLeft(state, key) {
        if (key === "health") return REVEAL_WEEKS;
        if (!state.riskIntel) return 0;
        return Math.max(0, (state.riskIntel[key] || 0) - state.week);
      }

      function applyEffect(state, effect, title) {
        const resolved = typeof effect === "function" ? effect(state) : effect;
        if (!resolved) return { ok: true };
        addDelta(state.branch, resolved.branch);
        addDelta(state.player, resolved.player);
        addDelta(state.hiddenRisks, resolved.hiddenRisks);
        addDelta(state.routeScores, resolved.routeScores);
        addDelta(state.flags, resolved.flags);
        if (resolved.cooldowns) addDelta(state.cooldowns, resolved.cooldowns);
        if (resolved.outlets) {
          resolved.outlets.forEach((patch) => {
            const outlet = state.outlets.find((item) => item.id === patch.id);
            if (outlet) addDelta(outlet, patch);
          });
        }
        if (resolved.employeePatch) {
          const employee = state.employees.find((item) => item.id === resolved.employeePatch.id);
          if (employee) addDelta(employee, resolved.employeePatch);
        }
        if (resolved.eventHint) maybeQueueSpecificEvent(state, resolved.eventHint, 0.48);
        if (resolved.log) addLog(state, title || "经营动作", resolved.log, resolved.type || "action");
        clampState(state);
        return { ok: true, effect: resolved };
      }

      function applyAction(state, actionId) {
        const action = ACTIONS.find((item) => item.id === actionId);
        if (!action) return { ok: false, message: "行动不存在。" };
        if (state.flags.ended || state.ending) return { ok: false, message: "任期已经结束。" };
        if (state.actionPoints < action.cost) return { ok: false, message: "行动点不足。" };
        if ((action.budgetCost || 0) > state.branch.marketingBudget) return { ok: false, message: "经营成本不足。" };
        state.actionPoints -= action.cost;
        state.branch.marketingBudget -= action.budgetCost || 0;
        if (action.route) state.routeScores[action.route] = (state.routeScores[action.route] || 0) + 1;
        const result = applyEffect(state, effectFromObject(action.effect)(state), action.name);
        if (action.reveals) revealRisk(state, action.reveals);
        maybeQueueActionEvent(state, action);
        saveGame(state, true);
        return result;
      }

      function getActionById(id) {
        return ACTIONS.find((item) => item.id === id);

          raise: { cost: 2, effect: { branch: { morale: 1 }, hiddenRisks: { employee: -5 }, employeePatch: { id: employeeId, loyalty: 12, salary: Math.max(2, Math.round(employee.salary * 0.2)) }, log: employee.name + "的薪资上调了一档（月薪约" + asMoney(round(employee.salary * 1.2 / 12, 1)) + "）。人心暖了，月度发薪的盘子也更重了。" } },
          dismiss: { cost: 3, effect: { branch: { morale: -5, salaryPool: -Math.round(Math.max(2, employee.salary * 0.3)) }, hiddenRisks: { employee: 8, publicOpinion: 4 }, log: employee.name + "离开了支行。付了一笔遣散，少了一个问题，也多了一种可能。" } }

        const item = map[operation];
        if (!item) return { ok: false, message: "操作不存在。" };

        if ((item.budgetCost || 0) > state.branch.marketingBudget) return { ok: false, message: "经营成本不足。" };

          if (employee.slotId) {

      function outletOperation(state, outletId, operation) {
        const outlet = state.outlets.find((item) => item.id === outletId);

        const map = {

        if ((item.budgetCost || 0) > state.branch.marketingBudget) return { ok: false, message: "经营成本不足。" };
        state.actionPoints -= item.cost;
