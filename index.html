<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江北支行 · 行长的三年</title>
<style>
:root{
  --bg:#1b1f27; --panel:#242a35; --panel2:#2c3442; --line:#3a4354;
  --txt:#e8e5dc; --dim:#9aa3b2; --gold:#e8b84b; --green:#6fc177; --red:#e06c60;
  --blue:#6aa8e0;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:"PingFang SC","Microsoft YaHei",sans-serif;font-size:15px;line-height:1.55}
#app{max-width:960px;margin:0 auto;padding:12px 12px 80px}

/* 顶部 */
.hdr{display:flex;justify-content:space-between;align-items:baseline;padding:6px 2px}
.hdr h1{font-size:19px;color:var(--gold);letter-spacing:1px}
.hdr .date{color:var(--dim);font-size:14px}
.hdr .date b{color:var(--txt)}

/* 数值条 */
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin:8px 0}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 4px;text-align:center;cursor:help;position:relative}
.stat .lb{font-size:12px;color:var(--dim)}
.stat .v{font-size:17px;font-weight:700;margin-top:1px}
.stat .v small{font-size:11px;font-weight:400;color:var(--dim)}
.stat .delta{font-size:11px;height:14px}
.up{color:var(--green)}.down{color:var(--red)}
.stat .tip{display:none;position:absolute;z-index:30;top:105%;left:50%;transform:translateX(-50%);width:190px;background:#111520;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12px;color:var(--dim);text-align:left}
.stat:hover .tip{display:block}
.stat.tipOn .tip{display:block}

/* 精力 */
.energy{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin-bottom:8px}
.energy .dots{letter-spacing:3px;font-size:16px;color:var(--gold);white-space:nowrap}
.energy .hint{color:var(--dim);font-size:13px;flex:1}
.energy button{margin-left:auto;white-space:nowrap}

/* 按钮 */
button{font-family:inherit;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:14px;cursor:pointer;transition:.15s;touch-action:manipulation}
*{-webkit-tap-highlight-color:transparent}
button:hover{border-color:var(--gold);color:var(--gold)}
button:disabled{opacity:.35;cursor:not-allowed}
button:disabled:hover{border-color:var(--line);color:var(--txt)}
button.main{background:var(--gold);color:#1b1f27;border-color:var(--gold);font-weight:700}
button.main:hover{filter:brightness(1.1);color:#1b1f27}

/* 行动区 */
.actions{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:8px}
.act{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:.15s;user-select:none}
.act:hover{border-color:var(--gold);transform:translateY(-1px)}
.act.off{opacity:.35;pointer-events:none}
.act .ic{font-size:22px}
.act .nm{font-size:14px;font-weight:700;margin:3px 0 1px}
.act .ds{font-size:11px;color:var(--dim)}

/* 标签页 */
.tabs{display:flex;gap:4px;margin-bottom:0}
.tabs button{flex:1;padding:7px 2px;font-size:14px;border-radius:8px 8px 0 0;border-bottom:none}
.tabs button.on{background:var(--panel);border-color:var(--gold);color:var(--gold)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:0 8px 8px 8px;padding:12px;min-height:280px}

/* 卡片 */
.card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.card .row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.card h3{font-size:15px;display:inline}
.card .sub{font-size:12px;color:var(--dim);margin-top:2px}
.card .num{font-size:13px;color:var(--dim)}
.card .num b{color:var(--txt)}
.stars{color:var(--gold);font-size:13px}
.tag{display:inline-block;font-size:11px;padding:1px 7px;border-radius:10px;margin-left:6px;vertical-align:1px}
.tag.mk{background:#4a3320;color:#f0a860}.tag.mg{background:#20364a;color:#7db8e8}.tag.rk{background:#213d2a;color:#84cc90}
.bar{height:6px;background:#171b23;border-radius:3px;margin-top:5px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:3px;background:var(--blue)}
.unlock{font-size:12px;margin-top:5px;color:var(--dim)}
.unlock .ok{color:var(--green)}
.cardbtns{margin-top:7px;display:flex;gap:6px;flex-wrap:wrap}
.cardbtns button{padding:5px 11px;font-size:13px}

/* 排行 */
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--line)}
th{color:var(--dim);font-weight:400;font-size:12px}
tr.me td{color:var(--gold);font-weight:700;background:#33301f}
.st-boom{color:var(--red);font-size:12px}

/* 日志 */
.log{font-size:13px;max-height:340px;overflow-y:auto}
.log p{padding:4px 2px;border-bottom:1px dashed #303948;color:var(--dim)}
.log p b{color:var(--txt)}
.log p.good{color:var(--green)}
.log p.bad{color:var(--red)}
.log p.month{color:var(--gold);font-weight:700;margin-top:4px}

/* 弹窗 */
.mask{position:fixed;inset:0;background:rgba(10,12,18,.78);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
.mask.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--gold);border-radius:14px;max-width:560px;width:100%;max-height:86vh;overflow-y:auto;padding:20px}
.modal h2{color:var(--gold);font-size:18px;margin-bottom:8px}
.modal .body{color:var(--txt);font-size:15px;margin-bottom:14px;white-space:pre-line}
.modal .opts{display:flex;flex-direction:column;gap:8px}
.modal .opts button{text-align:left;padding:11px 14px;line-height:1.4}
.modal .opts button small{display:block;color:var(--dim);font-size:12px;margin-top:2px}

/* 结算清单 */
.report .li{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed #303948;font-size:14px}
.report .li span:last-child{font-weight:700}

/* 结局页 */
#endScreen{position:fixed;inset:0;background:rgba(10,12,18,.93);display:none;align-items:flex-start;justify-content:center;z-index:60;overflow-y:auto;padding:20px}
#endScreen.show{display:flex}
.endcard{background:linear-gradient(160deg,#2b3242,#1d222d);border:2px solid var(--gold);border-radius:16px;max-width:520px;width:100%;padding:26px 24px;text-align:center;margin:auto}
.endcard .ename{color:var(--dim);font-size:14px;letter-spacing:1px}
.endcard .etitle{font-size:27px;color:var(--gold);letter-spacing:3px;margin:8px 0 2px}
.endcard .etext{text-align:left;white-space:pre-line;margin:14px 0;color:var(--txt);font-size:14px;line-height:1.7}
.egrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.egrid .eg{background:#161a22;border:1px solid var(--line);border-radius:10px;padding:9px 4px}
.egrid .eg .k{font-size:11px;color:var(--dim);margin-top:2px}
.egrid .eg .v{font-size:16px;font-weight:700;color:var(--gold)}
.badges{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0 4px}
.badge{font-size:12px;border:1px solid var(--gold);color:var(--gold);border-radius:12px;padding:2px 10px}
.endcard .shot{font-size:12px;color:var(--dim);margin-top:10px}
#nameInput{width:100%;padding:9px;border-radius:8px;border:1px solid var(--line);background:#171b23;color:var(--txt);font-size:15px;font-family:inherit}

/* 预报 */
.forecast{font-size:12px;color:var(--dim);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:6px 12px;margin-bottom:8px;display:flex;gap:14px;flex-wrap:wrap}
.forecast b{color:var(--txt)}

@media (max-width:640px){
  #app{padding:8px 8px 60px}
  .hdr h1{font-size:17px}
  .hdr .date{font-size:12px}
  .stats{grid-template-columns:repeat(3,1fr);gap:5px}
  .stat .v{font-size:15px}
  .actions{grid-template-columns:repeat(3,1fr)}
  .act .ic{font-size:19px}
  .act .nm{font-size:13px}
  .energy{padding:7px 10px;gap:6px}
  .energy .hint{display:none}
  .energy button{margin-left:auto}
  .forecast{gap:8px;padding:6px 10px}
  .modal{padding:15px 13px;max-height:82vh}
  .modal h2{font-size:16px}
  .modal .body{font-size:14px}
  th,td{padding:5px 5px;font-size:13px}
  .cardbtns button{padding:7px 10px}
  .endcard{padding:18px 14px}
  .endcard .etitle{font-size:22px}
  .egrid{gap:6px}
  .egrid .eg .v{font-size:14px}
  /* 提示框:手机上居中弹出,避免溢出屏幕 */
  .stat .tip{position:fixed;top:auto;bottom:16px;left:12px;right:12px;width:auto;transform:none;font-size:13px;padding:10px}
}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <h1>江北支行</h1>
    <div class="date">第<b id="hYear">1</b>年<b id="hMonth">1</b>月 · 还剩<b id="hLeft">36</b>个月</div>
  </div>

  <div class="stats" id="statBar"></div>

  <div class="energy">
    <span class="dots" id="energyDots">●●●</span>
    <span class="hint">每件事花1点精力,用完就结算</span>
    <button class="main" id="btnEnd">结束本月 ▶</button>
  </div>

  <div class="forecast" id="forecast"></div>

  <div class="actions" id="actionBar"></div>

  <div class="tabs" id="tabBar">
    <button data-tab="outlets" class="on">网点</button>
    <button data-tab="team">团队</button>
    <button data-tab="npc">关系</button>
    <button data-tab="rank">排行</button>
    <button data-tab="log">日志</button>
  </div>
  <div class="panel" id="panel"></div>
</div>

<div id="endScreen"><div class="endcard" id="endCard"></div></div>

<div class="mask" id="mask">
  <div class="modal">
    <h2 id="mTitle"></h2>
    <div class="body" id="mBody"></div>
    <div class="opts" id="mOpts"></div>
  </div>
</div>

<script>
"use strict";
/* ============ 静态数据 ============ */

const OUTLET_POOL = [
  {id:"lj", name:"两江新区支行", star:5, rent:12, cost:260, desc:"产业园扎堆,对公大户多,就是租金吓人"},
  {id:"lijia", name:"礼嘉支行", star:4, rent:9, cost:200, desc:"高端小区加科技公司,客户有钱也挑剔"},
  {id:"xy", name:"西永支行", star:3, rent:6, cost:150, desc:"电子厂区,代发工资是块肥肉"},
  {id:"cy", name:"茶园支行", star:3, rent:5, cost:130, desc:"新区住宅,慢热但稳"},
  {id:"cj", name:"蔡家支行", star:2, rent:3, cost:90, desc:"便宜,真便宜。客流嘛,也真一般"},
];

const NPCS = [
  {id:"lu", name:"陆明远", title:"分行行长", line:"领导", fav:40, pref:"gift",
   hint:"分行一把手,爱惜羽毛。听说他办公室的兰花都是下面人送的名品。",
   perk60:"每季度多批50万预算", perk80:"年终考核高看一档"},
  {id:"gu", name:"顾清越", title:"分行风险总监", line:"领导", fav:35, pref:"visit",
   hint:"办公室挂着『慎独』二字,开会从不参加饭局,水杯自己带。",
   perk60:"每月帮你压风险-3", perk80:"替你挡下一次大检查"},
  {id:"meng", name:"孟知微", title:"财政局副局长", line:"政府", fav:30, pref:"visit",
   hint:"局里出了名的严谨,材料错一个标点都要打回来重写。",
   perk60:"财政存款每月+1500万", perk80:"一笔国库款+2亿(一次性)"},
  {id:"han", name:"韩云帆", title:"住建委处长", line:"政府", fav:32, pref:"drink",
   hint:"嗓门大,脸上总是红扑扑的,工地上的人都叫他云哥。",
   perk60:"项目资金每月+1000万", perk80:"介绍市政大项目+1.5亿(一次性)"},
  {id:"wei", name:"魏临川", title:"渝江物流董事长", line:"客户", fav:38, pref:"drink",
   hint:"江湖气重,朋友遍布各个码头,发家前跑过十年货车。",
   perk60:"结算资金每月+1200万", perk80:"整存一笔+1亿,还帮你介绍朋友"},
  {id:"fan", name:"范以恒", title:"星桥科技创始人", line:"客户", fav:34, pref:"visit",
   hint:"典型理工男,微信头像是自家产品,朋友圈全是技术文章。",
   perk60:"发薪户存款每月+800万", perk80:"全公司代发工资+1.2亿(一次性)"},
];

const RIVALS = [
  {name:"渝中支行", boss:"陈崇山", style:"稳健", dep:30,  g:1.020, boom:0},
  {name:"渝北支行", boss:"马奔",   style:"狼性", dep:22,  g:1.038, boom:.10},
  {name:"南岸支行", boss:"黄世海", style:"灰色", dep:18,  g:1.034, boom:.12},
  {name:"九龙坡支行", boss:"唐建国", style:"关系", dep:15, g:1.020, boom:.04},
  {name:"沙坪坝支行", boss:"文卓然", style:"稳健", dep:13, g:1.014, boom:0},
  {name:"北碚支行", boss:"韦明德", style:"稳健", dep:11.5,g:1.011, boom:0},
  {name:"大渡口支行", boss:"石小川", style:"躺平", dep:8.5, g:1.006, boom:0},
  {name:"巴南支行", boss:"鲁达",   style:"躺平", dep:7,   g:1.005, boom:0},
];

const EMP_NAMES = ["赵铁柱","钱多多","孙小梅","李大有","周正","吴霜","郑重","王芳菲","冯远","陈皮","褚良","卫东","蒋勤","沈括","韩梅","杨帆","朱砂","秦川","尤优","许诺","何欢","吕布衣","施然","张弛","孔明亮","曹芳","严谨","华笙","金铭","魏来"];
const EMP_FLAVOR = {
  mk:["见人三分笑,下雨天都能约到客户","朋友圈天天发产品,居然真有人买","嘴皮子利索,茶馆里都能开出户来"],
  mg:["报表做得漂亮,底下人也服气","不声不响,把事理得顺顺的","开会从不超过半小时,员工爱他"],
  rk:["眼睛毒,假流水一眼看穿","宁可得罪客户,不给行里埋雷","天天念叨合规,烦是烦,顶用"],
};
const LEGEND_FLAVOR = [
  "总行战略客户部下来的老江湖,据说服务过三任行长",
  "从外资行跳回来的全能选手,简历厚得像本书",
  "业内都叫她『定海神针』,谁挖到谁赚",
];
function domType(e){ return e.mk>=e.mg && e.mk>=e.rk ? "mk" : (e.mg>=e.rk ? "mg" : "rk"); }
function attrTags(e){
  return `<span class="tag mk">营 ${e.mk}</span><span class="tag mg">管 ${e.mg}</span><span class="tag rk">风 ${e.rk}</span>`;
}
function bestEmp(attr, min){
  let best = null;
  for(const e of S.emps) if(e[attr]>=min && (!best || e[attr]>best[attr])) best = e;
  return best;
}

/* ============ 状态 ============ */
let S = null;
function salaryOf(e){ return +(0.3*(e.mk+e.mg+e.rk)).toFixed(1); }
const ri = n=>Math.floor(Math.random()*n);
function genCandidates(){
  const cands = [];
  const used = S ? S.emps.map(e=>e.name) : [];
  // 全五星传奇:小概率出现,20个月还没见过就提高概率,一局大约能遇到1~2个
  let legendChance = 0.045;
  if(S && S.month>=20 && !(S.track&&S.track.legend)) legendChance = 0.12;
  let legendSlot = Math.random()<legendChance ? ri(3) : -1;
  while(cands.length<3){
    const name = pick(EMP_NAMES);
    if(used.includes(name) || cands.some(c=>c.name===name)) continue;
    if(cands.length===legendSlot){
      const e = {name, mk:5, mg:5, rk:5, flavor:pick(LEGEND_FLAVOR)};
      e.salary = +(salaryOf(e)*1.4).toFixed(1);
      if(S && S.track) S.track.legend = (S.track.legend||0)+1;
      cands.push(e);
      continue;
    }
    const e = {name, mk:1+ri(3), mg:1+ri(3), rk:1+ri(3)};
    const spec = pick(["mk","mg","rk"]);
    e[spec] = Math.min(5, e[spec]+1+ri(2));
    e.flavor = pick(EMP_FLAVOR[domType(e)]);
    e.salary = salaryOf(e);
    cands.push(e);
  }
  return cands;
}

function newGame(){
  S = {
    month:1, energy:3, over:false,
    playerName: (function(){ try{return localStorage.getItem("jbzh_name")||"";}catch(e){return "";} })() || "无名行长",
    cash:300, dep:10, rep:50, morale:50, risk:20,
    lastDelta:{},
    marketing:false,
    negMonths:0,
    pledge:null,
    track:{social:0,hire:0,open:0,train:0,events:0,maxRisk:20},
    outlets:[
      {name:"观音桥支行", star:4, rent:8, dep:6, mgr:0, ramp:1, closed:0, desc:"江北门面,客流没得说"},
      {name:"复盛支行", star:2, rent:3, dep:4, mgr:null, ramp:1, closed:0, desc:"底子薄,胜在租金便宜"},
    ],
    emps:[
      {id:0, name:"老张", mk:2, mg:3, rk:2, flavor:"跟了三任行长的老班长,啥场面没见过", salary:2.1},
      {id:1, name:"小刘", mk:3, mg:1, rk:1, flavor:"年轻肯跑,就是还嫩了点", salary:1.5},
    ],
    empSeq:2,
    candidates:null,
    npcs: NPCS.map(n=>({...n, used80:false, tried:{}})),
    rivals: RIVALS.map(r=>({...r})),
    guardUsed:false,
    socialed:{},
    log:[],
    tab:"outlets",
  };
  S.candidates = genCandidates();
  log("month","第1年1月 · 你接手江北支行。存款10亿,全区第7。行长陆明远只撂下一句:三年,我看结果。");
  renderAll();
  askName();
}
function askName(){
  $("#mTitle").textContent = "上任报到";
  $("#mBody").innerHTML = `分行人事处的干部翻开登记簿,抬头看你:『新来的行长,怎么称呼?』<br><br><input id="nameInput" maxlength="8" placeholder="写个名字" value="${(S.playerName==="无名行长"?"":S.playerName)}">`;
  const box = $("#mOpts"); box.innerHTML = "";
  const btn = document.createElement("button"); btn.className = "main"; btn.textContent = "就叫这个";
  btn.onclick = ()=>{
    const v = $("#nameInput").value.trim() || "无名行长";
    S.playerName = v;
    try{ localStorage.setItem("jbzh_name", v); }catch(e){}
    $("#mask").classList.remove("show");
    showIntro();
  };
  box.appendChild(btn);
  $("#mask").classList.add("show");
  setTimeout(()=>{ const i=$("#nameInput"); if(i) i.focus(); }, 50);
}

/* ============ 工具 ============ */
const $ = s=>document.querySelector(s);
const fmt = n=>(+n).toFixed(1);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rnd=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
function starTxt(n){ return "★".repeat(n)+"☆".repeat(5-n); }
function yearOf(m){ return Math.ceil(m/12); }
function monOf(m){ return ((m-1)%12)+1; }
function log(cls,txt){ S.log.unshift({cls,txt}); }
function gain(key,v){
  if(key==="dep"){ S.dep=Math.max(0,S.dep+v); }
  else if(key==="cash"){ S.cash+=v; }
  else { S[key]=clamp(S[key]+v,0,100); }
  S.lastDelta[key]=(S.lastDelta[key]||0)+v;
  if(key==="risk" && S.track) S.track.maxRisk = Math.max(S.track.maxRisk, S.risk);
}
function myRank(){ let n=1; for(const r of S.rivals) if(r.dep>S.dep) n++; return n; }
function empById(id){ return S.emps.find(e=>e.id===id); }
function freeEmps(){ const used=S.outlets.map(o=>o.mgr); return S.emps.filter(e=>!used.includes(e.id)); }

/* ============ 弹窗队列 ============ */
const MQ = [];
function showModal(title, body, opts){
  $("#mTitle").textContent = title;
  $("#mBody").textContent = body;
  const box = $("#mOpts"); box.innerHTML = "";
  opts.forEach(o=>{
    const b = document.createElement("button");
    b.innerHTML = o.t + (o.s ? `<small>${o.s}</small>` : "");
    if(o.disabled) b.disabled = true;
    b.onclick = ()=>{
      $("#mask").classList.remove("show");
      if(o.fn) o.fn();
      if(!$("#mask").classList.contains("show")) flushMQ();
    };
    box.appendChild(b);
  });
  $("#mask").classList.add("show");
}
function flushMQ(){
  if(MQ.length){ MQ.shift()(); }
  else renderAll();
}
function runQueue(fns){ MQ.push(...fns); flushMQ(); }

/* ============ 产出与预报 ============ */
function mgrCoef(o){
  const m = o.mgr!=null ? empById(o.mgr) : null;
  if(!m) return 0.5;
  return 0.6 + m.mk*0.13;   // 主任的营销星决定网点产出
}
function seasonInfo(){
  const m = monOf(S.month);
  if(m===1) return {f:1.25, txt:"🧧 开门红,产出×1.25"};
  if(m===8) return {f:0.85, txt:"🥵 酷暑淡季,产出×0.85"};
  return {f:1, txt:""};
}
function outletOutput(o){
  if(o.closed>0) return 0;
  let out = 0.08 * o.star * mgrCoef(o) * (0.6 + S.morale/300) * o.ramp;
  out *= 1 + 0.15*(o.deco||0);
  out *= seasonInfo().f;
  if(S.marketing) out *= 1.5;
  return out;
}
const DECO_TIERS = [
  {name:"精装修", cost:200, desc:"大理石柜面、智能叫号,产出+15%"},
  {name:"旗舰店改造", cost:500, desc:"贵宾室、咖啡吧、理财沙龙,产出共+30%"},
];
function upgradeDeco(oi){
  const o = S.outlets[oi];
  const tier = DECO_TIERS[o.deco||0];
  if(!tier) return;
  showModal(`${o.name} · ${tier.name}`, `${tier.desc}。一次性投入${tier.cost}万。`,[
    {t:`砸${tier.cost}万,干`, disabled:S.cash<tier.cost, fn:()=>{
      gain("cash",-tier.cost);
      o.deco = (o.deco||0)+1;
      log("good", `<b>${o.name}</b>完成${tier.name},客户进门都说了句『可以嘛』。产出+15%。`);
    }},
    {t:"再攒攒", fn:()=>{}},
  ]);
}
function totalSalary(){ return S.emps.reduce((s,e)=>s+e.salary,0); }
function totalRent(){ return S.outlets.reduce((s,o)=>s+o.rent,0); }
function npcMonthlyDep(){
  let v=0;
  for(const n of S.npcs){
    if(n.fav<60) continue;
    if(n.id==="meng") v+=0.15;
    if(n.id==="han") v+=0.10;
    if(n.id==="wei") v+=0.12;
    if(n.id==="fan") v+=0.08;
  }
  return v;
}

function spend(n){ S.energy-=n; renderAll(); }
function needEnergy(){
  if(S.energy<=0){
    showModal("精力用完了","这个月能跑的都跑了。点『结束本月』看看收成。",[{t:"好"}]);
    return false;
  }

}

function actRun(){
  if(!needEnergy()) return;
  const v = +(rnd(0.06,0.16)*(0.7+S.rep/200)).toFixed(2);
  gain("dep", v); gain("rep", 1);
  log("good", `你带队跑了一圈市场,拉回存款 <b>${v}亿</b>,口碑+1。`);
  spend(1);
}

function actHire(){
  if(!needEnergy()) return;
  if(S.emps.length>=8){
    showModal("编制满了","8个人已经顶格,想招新人得先送走老的。",[{t:"知道了"}]);
    return;
  }
  const cands = S.candidates || [];
  if(!cands.length){
    showModal("没简历了","这个月的简历都看完了,人力下个月才送新的来。",[{t:"知道了"}]);
    return;
  }
  showModal("本月人才市场","这几份简历一个月就换一批,看准了下手。签一个花1点精力。",
    cands.map(c=>({
      t:`${c.name} · 营${c.mk} 管${c.mg} 风${c.rk}${c.mk+c.mg+c.rk>=15?" 🌟":""}`,
      s:`月薪${c.salary}万 · ${c.flavor}`,
      fn:()=>{
        c.id = S.empSeq++;
        S.emps.push(c);
        S.candidates = S.candidates.filter(x=>x!==c);
        S.track.hire++;
        log("good", `<b>${c.name}</b>(营${c.mk}/管${c.mg}/风${c.rk})入职,月薪${c.salary}万。`);
        spend(1);
      }
    })).concat([{t:"都不合适", s:"先不签,不花精力(本月简历就这些)", fn:()=>{}}])
  );
}

function actOpen(){
  if(!needEnergy()) return;
  const have = S.outlets.map(o=>o.name);
  const avail = OUTLET_POOL.filter(p=>!have.includes(p.name));
  if(!avail.length){
    showModal("没地方开了","全区能开的点都开完了,好好经营手上这几家吧。",[{t:"好"}]);
    return;
  }
  showModal("开新网点","选个地方。开办费一次性付清,之后每月交租,账上还得留够60万周转金,不然月底发不出工资。新网点要爬坡3个月才满产。",
    avail.map(p=>{
      const rentNow = +(p.rent*Math.pow(1.12, yearOf(S.month)-1)).toFixed(1);
      return {
      t:`${p.name} 地段${starTxt(p.star)}`,
      s:`开办费${p.cost}万 · 月租${rentNow}万 · ${p.desc}`,
      disabled:S.cash<p.cost+60,
      fn:()=>{
        gain("cash",-p.cost);
        S.outlets.push({name:p.name, star:p.star, rent:rentNow, dep:0, mgr:null, ramp:0.5, closed:0, desc:p.desc});
        S.track.open++;
        log("good", `<b>${p.name}</b>开业!鞭炮放了三挂。记得派个主任过去。`);
        spend(1);
      }
    };}).concat([{t:"再看看", s:"不花精力", fn:()=>{}}])
  );
}

function doSocial(npcId, method){
  if(!needEnergy()) return;
  const n = S.npcs.find(x=>x.id===npcId);
  if(S.socialed[npcId]){
    showModal("这个月见过了", `${n.name}这个月刚见过,再去就烦了。下个月再说。`,[{t:"好"}]);
    return;
  }
  const cost = method==="drink"?5 : method==="gift"?15 : 0;
  if(S.cash<cost){
    showModal("钱不够","现金不够,先想办法回血吧。",[{t:"好"}]);
    return;
  }
  const bad = {gu:"drink", fan:"drink", meng:"gift", lu:"drink"}[npcId];
  let d, txt;
  if(method===n.pref){ d=12; txt=`正对胃口,好感+12`; }
  else if(method===bad){ d=-5; txt=`踩雷了,好感-5`; }
  else { d=6; txt=`不咸不淡,好感+6`; }
  n.tried[method] = d;
  S.track.social++;
  gain("cash",-cost);
  const before = n.fav;
  n.fav = clamp(n.fav+d, 0, 100);
  S.socialed[npcId]=1;
  const mtxt = {visit:"正式拜访", drink:"约了顿酒", gift:"备了份礼"}[method];
  log(d>0?"good":"bad", `${mtxt}<b>${n.name}</b>。${txt}${cost?`,花${cost}万`:""}。`);
  const notes = [];
  if(before<60 && n.fav>=60) notes.push(`【好感到60】解锁:${n.perk60}`);
  if(before<80 && n.fav>=80 && !n.used80){
    n.used80 = true;
    if(n.id==="meng"){ gain("dep",2); notes.push("【好感到80】孟知微批了一笔国库款,存款+2亿!"); log("good","孟知微批了一笔国库款,<b>存款+2亿</b>!"); }
    if(n.id==="han"){ gain("dep",1.5); notes.push("【好感到80】韩云帆介绍的市政项目落地,存款+1.5亿!"); log("good","韩云帆介绍的市政项目落地,<b>存款+1.5亿</b>!"); }
    if(n.id==="wei"){ gain("dep",1); gain("rep",5); notes.push("【好感到80】魏临川整存1亿,还在圈子里替你吆喝,口碑+5!"); log("good","魏临川整存1亿,还替你吆喝,口碑+5!"); }
    if(n.id==="fan"){ gain("dep",1.2); notes.push("【好感到80】星桥科技全员代发工资落地,存款+1.2亿!"); log("good","星桥科技代发工资落地,<b>存款+1.2亿</b>!"); }
    if(n.id==="gu"){ notes.push("【好感到80】顾清越私下说:出了事,我先替你顶一次。(挡一次大检查)"); log("good","顾清越:出了事,我先替你顶一次。"); }
    if(n.id==="lu"){ notes.push("【好感到80】陆明远在会上点名表扬你。年终考核高看一档。"); log("good","陆明远点名表扬。年终考核高看一档。"); }
  }
  spend(1);
  const react = d>=12 ? "good" : (d<0 ? "bad" : "ok");
  const scene = DIALOG[npcId] && DIALOG[npcId][react] ? DIALOG[npcId][react] : "寒暄了几句,不咸不淡。";
  const tail = `—— ${txt}${cost?`,花${cost}万`:""}` + (notes.length ? "\n\n"+notes.join("\n") : "");
  showModal(`${n.name} · ${SCENES[method]}`, scene + "\n\n" + tail, [{t:"告辞"}]);
}

function assignMgr(oi){
  const o = S.outlets[oi];
  const free = freeEmps();
  if(!free.length){
    showModal("没人可派","员工都派出去了或者没招人。先去招聘。",[{t:"好"}]);
    return;
  }
  showModal(`给${o.name}派主任`,"主任的营销星直接决定网点产出,挑营销星最高的准没错。",
    free.map(e=>({
      t:`${e.name} · 营${e.mk} 管${e.mg} 风${e.rk}`,
      s:e.flavor,
      fn:()=>{ o.mgr=e.id; log("good",`<b>${e.name}</b>出任${o.name}主任。`); }
    })).concat([{t:"先不派", fn:()=>{}}])
  );
}
function recallMgr(oi){
  const o = S.outlets[oi];
  const m = empById(o.mgr);
  o.mgr = null;
  log("", `${m.name}从${o.name}调回机动队。`);
  renderAll();
}
function trainEmp(id){
  const e = empById(id);
  const NM = {mk:"营销", mg:"管理", rk:"风控"};
  showModal("送培训 · "+e.name, "花100万送去省行青干班,选个主攻方向升1星(月薪+0.3万)。",
    ["mk","mg","rk"].map(k=>({
      t:`主攻${NM[k]}:${e[k]}星 → ${Math.min(5,e[k]+1)}星`,
      disabled: e[k]>=5 || S.cash<100,
      fn:()=>{
        gain("cash",-100); e[k]++; e.salary=+(e.salary+0.3).toFixed(1); S.track.train++;
        log("good", `<b>${e.name}</b>培训归来,${NM[k]}${e[k]}星,走路都带风。`);
      }
    })).concat([{t:"算了", fn:()=>{}}])
  );
}
function fireEmp(id){
  const e = empById(id);
  showModal("解雇 "+e.name, `真要让${e.name}走人?士气会掉5点,网点主任职务同时卸任。`,[
    {t:"送走", fn:()=>{
      S.outlets.forEach(o=>{ if(o.mgr===id) o.mgr=null; });
      S.emps = S.emps.filter(x=>x.id!==id);
      gain("morale",-5);
      log("bad", `${e.name}收拾东西走了,士气-5。`);
    }},
    {t:"再想想", fn:()=>{}},
  ]);
}

function pickEvent(){
  const pool = EVENTS.filter(e=>{
    if(e.once && S.usedOnce && S.usedOnce.includes(e.id)) return false;
    if(S.lastEv===e.id) return false;
    if(e.cond && !e.cond()) return false;
    return true;
  });
  if(!pool.length) return null;
  return pick(pool);
}
function fireEvent(){
  const ev = pickEvent();
  if(!ev) return null;
  S.lastEv = ev.id;
  S.track.events++;
  if(ev.once){ S.usedOnce = S.usedOnce||[]; S.usedOnce.push(ev.id); }
  const ctx = ev.pre ? ev.pre() : null;
  const body = typeof ev.body==="function" ? ev.body(ctx) : ev.body;
  const opts = ev.opts(ctx);
  return ()=>showModal("📌 "+ev.title, body, opts);
}

/* ============ 月度结算 ============ */
function endMonth(){
  if(S.over) return;
  const lines = [];
  S.lastDelta = {};

  // 1. 存款进项
  let prod = 0;
  for(const o of S.outlets){
    const v = outletOutput(o);
    prod += v;
    if(o.closed>0){ o.closed--; if(o.closed===0) log("", `${o.name}修好了,重新开门营业。`); }
    if(o.ramp<1){ o.ramp = Math.min(1, +(o.ramp+0.25).toFixed(2)); }
    o.dep += v;
  }
  const npcDep = npcMonthlyDep();
  const natural = +(Math.min(S.dep,50)*(S.rep-50)*0.00015).toFixed(2);
  // 营销星:机动队员拉存款(主任的营销星已算进网点产出);管理星养士气、风控星压风险:全员生效
  let roamDep = 0, roamMorale = 0, roamRisk = 0;
  for(const e of freeEmps()) roamDep += 0.025*e.mk;
  for(const e of S.emps){ roamMorale += 0.1*e.mg; roamRisk -= 0.2*e.rk; }
  gain("dep", prod + npcDep + natural + roamDep);
  lines.push(["网点产出", `+${fmt(prod)}亿`]);
  if(npcDep>0) lines.push(["关系户存款", `+${fmt(npcDep)}亿`]);
  if(roamDep>0) lines.push(["机动队拉存款", `+${fmt(roamDep)}亿`]);
  lines.push(["口碑自然增长", `${natural>=0?"+":""}${fmt(natural)}亿`]);

  // 2. 现金收支
  const income = Math.round(S.dep*2);
  const sal = +totalSalary().toFixed(1);
  const rent = totalRent();
  gain("cash", income - sal - rent);
  lines.push(["经营收入(存款×2万/亿)", `+${income}万`]);
  lines.push(["工资支出", `-${sal}万`]);
  lines.push(["房租支出", `-${rent}万`]);

  // 3. 欠薪判定
  if(S.cash<0){
    S.negMonths++;
    gain("morale",-12);
    log("bad", `<b>账上没钱,工资发不出来!</b>士气-12。(连续${S.negMonths}个月)`);
    lines.push(["⚠ 欠薪", "士气-12"]);
  } else S.negMonths = 0;

  // 4. 自然衰减 & 被动效果
  gain("morale", -3 + roamMorale);
  gain("rep", -2);
  if(roamRisk!==0) gain("risk", roamRisk);
  const gu = S.npcs.find(n=>n.id==="gu");
  if(gu.fav>=60) gain("risk",-3);
  for(const n of S.npcs){ if(n.fav>40 && !S.socialed[n.id]) n.fav-=2; }

  // 5. 对手成长
  for(const r of S.rivals){
    r.dep *= r.g;
    if(r.boom && Math.random()<r.boom/3){
      r.dep *= 0.85;
      gain("dep",0.3); gain("rep",2);
      log("good", `<b>${r.name}爆雷了!</b>${r.boss}焦头烂额。惊魂未定的客户转投你门下,存款+0.3亿。`);
    }
  }

  // 6. 风险警报
  let failEnd = null;
  if(S.risk>=85){
    if(gu.used80 && !S.guardUsed){
      S.guardUsed = true;
      gain("risk",-25);
      log("bad","<b>审计组本来要进驻江北,顾清越把报告压了三天,给你争取了整改时间。</b>风险-25。这个人情,只有一次。");
    } else {
      failEnd = ["东窗事发","审计组进驻第三天,你办公室被贴了封条。带走那天,你回头看了一眼「江北支行」四个字。\n\n——风险攒到85就是这个下场。免职,游戏结束。"];
    }
  } else if(S.risk>=60){
    log("bad","风险已过60,分行那边有风声了。抓紧『抓内部→排查风险』,或者多养几个风控星高的员工。");
  }
  if(!failEnd && S.morale<=10) failEnd = ["人心散了","骨干走光了,柜台连班都排不开。分行党委研究决定:江北支行领导班子调整。\n\n——士气跌破10,队伍散了。游戏结束。"];
  if(!failEnd && S.negMonths>=3) failEnd = ["揭不开锅","连续三个月发不出工资,员工把横幅挂到了分行门口。江北支行被渝中支行托管。\n\n——现金连续3个月为负。游戏结束。"];

  // 7. 组装结算流程
  const fns = [];
  const mNow = S.month;
  fns.push(()=>showModal(`${yearOf(mNow)}年${monOf(mNow)}月 · 月度结算`,
    "", []) );
  // 用报表形式重写结算弹窗
  fns[0] = ()=>{
    $("#mTitle").textContent = `第${yearOf(mNow)}年${monOf(mNow)}月 · 结算`;
    const b = $("#mBody"); b.innerHTML = "";
    const rep = document.createElement("div"); rep.className="report";
    lines.forEach(([k,v])=>{
      const d=document.createElement("div"); d.className="li";
      d.innerHTML=`<span>${k}</span><span class="${v.startsWith("+")?"up":(v.startsWith("-")?"down":"")}">${v}</span>`;
      rep.appendChild(d);
    });
    const sum=document.createElement("div"); sum.className="li";
    sum.innerHTML=`<span><b>存款 ${fmt(S.dep)}亿 · 现金 ${Math.round(S.cash)}万 · 第${myRank()}名</b></span><span></span>`;
    rep.appendChild(sum);
    b.appendChild(rep);
    const box=$("#mOpts"); box.innerHTML="";
    const btn=document.createElement("button"); btn.textContent="下一步";
    btn.onclick=()=>{ $("#mask").classList.remove("show"); flushMQ(); };
    box.appendChild(btn);
    $("#mask").classList.add("show");
  };

  if(failEnd){
    fns.push(()=>showEnd(failEnd[0], failEnd[1], false));
    runQueue(fns); return;
  }

  // 军令状到期结算
  if(S.pledge && mNow>=S.pledge.due){
    const p = S.pledge; S.pledge = null;
    const lu = S.npcs.find(n=>n.id==="lu");
    if(S.dep>=p.target){
      gain("cash",150); lu.fav = clamp(lu.fav+6,0,100);
      log("good", `<b>军令状兑现!</b>存款${fmt(S.dep)}亿,超过目标${p.target}亿。陆明远特批150万,好感+6。`);
      fns.push(()=>showModal("军令状 · 兑现", `存款${fmt(S.dep)}亿,军令状目标${p.target}亿——成了!\n\n陆明远当众把150万经费批给江北:『说话算话,好样的。』好感+6。`, [{t:"痛快"}]));
    } else {
      lu.fav = clamp(lu.fav-8,0,100); gain("morale",-5);
      log("bad", `<b>军令状砸了。</b>差${fmt(p.target-S.dep)}亿。陆明远好感-8,士气-5。`);
      fns.push(()=>showModal("军令状 · 砸了", `存款${fmt(S.dep)}亿,离军令状的${p.target}亿还差${fmt(p.target-S.dep)}亿。\n\n汇报会上,陆明远把茶杯放得很响,一个字没说。好感-8,士气-5。`, [{t:"憋屈"}]));
    }
  }

  // 每月必有一件事等着你拍板
  const evFn = fireEvent();
  if(evFn) fns.push(evFn);

  // 季度点评
  if(monOf(mNow)%3===0){
    fns.push(()=>{
      const r = myRank();
      const lu = S.npcs.find(n=>n.id==="lu");
      let cmt;
      if(r<=2) cmt = "陆明远在季度会上点了你的名:『都学学江北!』散会后好几个行长过来敬烟。";
      else if(r<=4) cmt = "季度会上,陆明远看了你一眼,没说好也没说坏。你后背出了点汗。";
      else if(r<=6) cmt = "陆明远敲着桌子:『江北,中游晃悠到什么时候?』你把头埋低了些。";
      else cmt = "散会后陆明远单独留下你:『再在后三名待着,你自己写报告解释。』";
      if(lu.fav>=60){ gain("cash",50); cmt += "\n\n(陆行长额外给江北批了50万经费——好感60的面子)"; }
      showModal(`第${Math.ceil(mNow/3)}季度排名:全区第${r}`, cmt, [{t:"继续"}]);
    });
    // 军令状邀约
    if(mNow<36 && !S.pledge){
      fns.push(()=>{
        const add = Math.max(1.5, +(S.dep*0.10).toFixed(1));
        const target = +(S.dep+add).toFixed(1);
        showModal("军令状", `散会后,陆明远把你单独留下,烟灰缸推到你面前:\n『敢不敢立个军令状——三个月,存款做到${target}亿。成了,经费我特批;砸了,你自己掂量。』`, [
          {t:"立!", s:`3个月内存款≥${target}亿 · 成:现金+150万、好感+6;败:好感-8、士气-5`, fn:()=>{
            S.pledge = {target, due:mNow+3};
            log("good", `你当场立下军令状:第${yearOf(mNow+3)}年${monOf(mNow+3)}月底,存款≥${target}亿。`);
          }},
          {t:"稳妥起见,不立", s:"没有惩罚,就是气氛有点尴尬", fn:()=>{
            log("", "你打了个哈哈把话岔开了。陆明远眼里闪过一丝失望。");
          }},
        ]);
      });
    }
  }

  // 年度涨薪涨租 + 年度考核
  if(monOf(mNow)===12 && mNow<36){
    for(const e of S.emps) e.salary = +(e.salary*1.15).toFixed(1);
    for(const o of S.outlets) o.rent = +(o.rent*1.12).toFixed(1);
    log("bad","开年全行业普涨工资15%,房东们也默契地把租金抬了12%。");
    fns.push(()=>{
      const y = yearOf(mNow);
      const target = y===1 ? 16 : 28;
      let txt;
      if(S.dep>=target){
        gain("cash",100); gain("rep",5);
        const lu=S.npcs.find(n=>n.id==="lu"); lu.fav=clamp(lu.fav+5,0,100);
        txt = `年度目标${target}亿——完成!\n\n分行发了100万奖励经费,口碑+5,陆明远好感+5。\n年会上你多喝了两杯。`;
      } else {
        gain("rep",-5); gain("morale",-5);
        const lu=S.npcs.find(n=>n.id==="lu"); lu.fav=clamp(lu.fav-8,0,100);
        txt = `年度目标${target}亿——差了${fmt(target-S.dep)}亿。\n\n考核会上你做了检讨。口碑-5,士气-5,陆明远好感-8。\n明年${y===1?"28亿":"就是终点"},没有退路了。`;
      }
      showModal(`第${y}年年度考核`, txt, [{t:"继续"}]);
    });
  }

  // 终局 or 下个月
  if(mNow>=36){
    fns.push(()=>finalEnding());
  } else {
    fns.push(()=>{
      S.month++;
      S.energy=3-(S.energyPenalty||0);
      S.energyPenalty=0;
      S.socialed={};
      S.marketing=false;
      S.candidates = genCandidates();
      log("month", `—— 第${yearOf(S.month)}年${monOf(S.month)}月 ——`);
      flushMQ();
    });
  }
  runQueue(fns);
}

/* ============ 结局 ============ */
function finalEnding(){
  let r = myRank();
  const lu = S.npcs.find(n=>n.id==="lu");
  let bump = "";
  if(lu.used80 && r>1){ r--; bump = "\n\n(陆明远在考评会上替你说了话,排名按高一档算——好感80的分量)"; }
  let title, txt;
  if(r===1){ title="北疆之王"; txt=`三年,存款${fmt(S.dep)}亿,全区第一。\n\n分行大会上,陆明远亲自给你戴上大红花:『下个月,到分行来,副行长的办公室给你留好了。』`; }
  else if(r<=3){ title="明星行长"; txt=`三年,存款${fmt(S.dep)}亿,全区第${r}。\n\n表彰文件传遍全分行,你的名字写进了后备干部名单第一页。`; }
  else if(r<=6){ title="稳字当头"; txt=`三年,存款${fmt(S.dep)}亿,全区第${r}。\n\n不好不坏,留任江北。陆明远拍拍你的肩:『再来三年?』你笑了笑,没接话。`; }
  else { title="清收办喝茶"; txt=`三年,存款${fmt(S.dep)}亿,全区第${r}。\n\n调令下来了:去分行清收办报到。那间办公室,没有窗户。`; }
  showEnd(title, txt+bump, r<=3);
}
function showEnd(title, txt, good){
  S.over = true;
  try{ localStorage.removeItem("jbzh_save4"); }catch(e){}
  $("#mask").classList.remove("show"); MQ.length = 0;
  const t = S.track||{};
  const fans = S.npcs.filter(n=>n.fav>=80).length;
  const badges = [];
  if(myRank()===1) badges.push("👑 全区第一");
  if((t.maxRisk||0)<40) badges.push("🧊 干干净净");
  if(S.outlets.length>=6) badges.push("🏗 基建狂魔");
  if(fans>=3) badges.push("🍶 人脉王");
  if(S.morale>=80) badges.push("❤️ 员工爱戴");
  if(S.rep>=85) badges.push("📣 金字招牌");
  if(S.emps.some(e=>e.mk>=5&&e.mg>=5&&e.rk>=5)) badges.push("🌟 麾下有传奇");
  if((t.train||0)>=3) badges.push("🎓 育人有方");
  if((t.social||0)<=8 && S.month>=36) badges.push("🐺 独行侠");
  if(S.dep>=60) badges.push("💰 六十亿俱乐部");
  if((t.maxRisk||0)>=70 && S.month>=36) badges.push("🎢 刀尖上跳舞");
  if(!badges.length) badges.push("🍵 平平安安也是福");
  const gr = [
    ["最终存款", fmt(S.dep)+"亿"],
    ["最终排名", "第"+myRank()+"名"],
    ["在任", S.month+"个月"],
    ["存款翻了", (S.dep/10).toFixed(1)+"倍"],
    ["网点", S.outlets.length+"家"],
    ["麾下", S.emps.length+"人"],
    ["招过的人", (t.hire||0)+"人"],
    ["应酬", (t.social||0)+"次"],
    ["风险峰值", Math.round(t.maxRisk||0)],
  ];
  $("#endCard").innerHTML = `
    <div class="ename">《江北支行》三年任期结算 · 行长 ${S.playerName}</div>
    <div class="etitle">${good?"🏆":"🍂"} ${title}</div>
    <div class="etext">${txt}</div>
    <div class="egrid">${gr.map(([k,v])=>`<div class="eg"><div class="v">${v}</div><div class="k">${k}</div></div>`).join("")}</div>
    <div class="badges">${badges.map(b=>`<span class="badge">${b}</span>`).join("")}</div>
    <button class="main" onclick="restartGame()" style="margin-top:10px;width:100%">再开一局</button>
    <div class="shot">截个屏,晒晒你的三年</div>`;
  $("#endScreen").classList.add("show");
}
function restartGame(){
  $("#endScreen").classList.remove("show");
  newGame();
}

  {k:"cash", lb:"现金", unit:"万", tip:"发工资、交房租、送礼、开网点全靠它。负数=欠薪,士气暴跌;连负3个月直接出局。", f:v=>Math.round(v)},
  {k:"dep", lb:"存款", unit:"亿", tip:"你的成绩单,排名只看它。来源:网点产出、关系户、跑业务、随机事件。每亿存款每月带来1.5万经营收入。", f:v=>fmt(v)},
  {k:"rep", lb:"口碑", unit:"", tip:"高于50,存款自然上涨;低于50,客户悄悄流失。每月自然-1,得靠跑业务、办活动、处理好事件来养。", f:v=>Math.round(v)},
  {k:"morale", lb:"士气", unit:"", tip:"直接乘在网点产出上。每月自然-3,团建+12,员工的管理星每月自动补一些。跌破10队伍就散了。", f:v=>Math.round(v)},
  {k:"risk", lb:"风险", unit:"", tip:"灰色操作会攒风险。到60分行盯上你,到85直接免职。排查-15,员工的风控星每月自动降一些。", f:v=>Math.round(v)},
  {k:"rank", lb:"排名", unit:"/9", tip:"全区9家支行按存款排座次。季度点评、年度考核、最终结局都看它。", f:()=>myRank()},
];
function renderStats(){
  const el = $("#statBar"); el.innerHTML="";
  for(const d of STAT_DEFS){
    const v = d.k==="rank" ? myRank() : S[d.k];
    const delta = S.lastDelta[d.k]||0;
    const div = document.createElement("div"); div.className="stat";
    let color = "";
    if(d.k==="risk") color = v>=60?"style='color:var(--red)'":(v>=40?"style='color:var(--gold)'":"");
    if(d.k==="cash" && v<0) color = "style='color:var(--red)'";
    if(d.k==="morale" && v<25) color = "style='color:var(--red)'";
    div.innerHTML = `<div class="lb">${d.lb}</div><div class="v" ${color}>${d.f(v)}<small>${d.unit}</small></div>
      <div class="delta ${delta>0?"up":delta<0?"down":""}">${delta? (delta>0?"+":"")+(d.k==="dep"?fmt(delta):Math.round(delta)) : ""}</div>
      <div class="tip">${d.tip}</div>`;
    // 手机没有hover:点一下显示说明,再点收起,点别处也收起
    div.onclick = (ev)=>{
      const was = div.classList.contains("tipOn");
      document.querySelectorAll(".stat.tipOn").forEach(x=>x.classList.remove("tipOn"));
      if(!was) div.classList.add("tipOn");
      ev.stopPropagation();
    };
    el.appendChild(div);
  }
}
function renderEnergy(){
  $("#energyDots").textContent = "●".repeat(S.energy)+"○".repeat(3-S.energy);
  $("#hYear").textContent = yearOf(S.month);
  $("#hMonth").textContent = monOf(S.month);
  $("#hLeft").textContent = 36-S.month+1;
}

    const hint = document.createElement("div"); hint.className="sub";
    hint.style.padding="4px";
    hint.textContent = `产出公式:0.08亿 × 地段星 × 主任系数 × 士气系数。营销型主任产出最高,没主任只有一半。想扩张,点上面『开网点』。`;
    el.appendChild(hint);
  }
  if(t==="team"){
    const head = document.createElement("div"); head.className="sub"; head.style.marginBottom="8px";
    head.innerHTML = `在编 <b>${S.emps.length}/8</b> 人,月工资合计 <b>${totalSalary().toFixed(1)}万</b>。三项能力各有用处:<b>营销星</b>当主任撑网点产出、在机动队拉存款;<b>管理星</b>全员生效养士气;<b>风控星</b>全员生效压风险。部分突发事件里,有高星专才能解锁更好的选项。`;
    el.appendChild(head);
    S.emps.forEach(e=>{
      const post = S.outlets.find(o=>o.mgr===e.id);
      const duty = post
        ? `${post.name}主任(产出系数${(0.6+e.mk*0.13).toFixed(2)})`
        : `机动队 · 每月拉存款+${fmt(0.025*e.mk)}亿`;
      const c = document.createElement("div"); c.className="card";
      c.innerHTML = `<div class="row"><div><h3>${e.name}</h3>${attrTags(e)}${e.mk+e.mg+e.rk>=15?'<span class="tag" style="background:#4a3320;color:var(--gold)">🌟 传奇</span>':''}</div><div class="num">月薪 <b>${e.salary}万</b></div></div>
        <div class="sub">${e.flavor}</div>
        <div class="sub">岗位:<b style="color:var(--txt)">${duty}</b> · 管理星每月士气+${(0.15*e.mg).toFixed(1)},风控星每月风险-${(0.2*e.rk).toFixed(1)}</div>
        <div class="cardbtns">${(e.mk<5||e.mg<5||e.rk<5)?`<button onclick="trainEmp(${e.id})">培训 100万</button>`:""}<button onclick="fireEmp(${e.id})">解雇</button></div>`;
      el.appendChild(c);
    });
  }
  if(t==="npc"){
    const head = document.createElement("div"); head.className="sub"; head.style.marginBottom="8px";
    head.innerHTML = `每个人吃哪一套,得自己试——投其所好+12,不对路+6,踩雷-5。试过一次就记住了。好感过60/80解锁福利,不走动每月-2,每人每月只能见一次。`;
    el.appendChild(head);
    const mark = v => v===undefined ? "" : (v>=12?" ✓":(v<0?" ✗":" ·"));
    S.npcs.forEach(n=>{
      const c = document.createElement("div"); c.className="card";
      const met = S.socialed[n.id];
      const noE = S.energy<=0;
      const tr = n.tried||{};
      c.innerHTML = `<div class="row"><div><h3>${n.name}</h3> <span class="sub" style="display:inline">${n.title}</span>
        <span class="tag" style="background:#333;color:#aaa">${n.line}</span></div>
        <div class="num">好感 <b>${n.fav}</b></div></div>
        <div class="bar"><i style="width:${n.fav}%;background:${n.fav>=80?"var(--gold)":n.fav>=60?"var(--green)":"var(--blue)"}"></i></div>
        <div class="sub">${n.hint}</div>
        <div class="unlock"><span class="${n.fav>=60?"ok":""}">${n.fav>=60?"✓":"○"} 60 ${n.perk60}</span><br>
        <span class="${n.fav>=80?"ok":""}">${n.fav>=80?"✓":"○"} 80 ${n.perk80}</span></div>
        <div class="cardbtns">
          <button ${met||noE?"disabled":""} onclick="doSocial('${n.id}','visit')">正式拜访${mark(tr.visit)}</button>
          <button ${met||noE?"disabled":""} onclick="doSocial('${n.id}','drink')">酒局 5万${mark(tr.drink)}</button>
          <button ${met||noE?"disabled":""} onclick="doSocial('${n.id}','gift')">送礼 15万${mark(tr.gift)}</button>
          ${met?'<span class="sub" style="align-self:center">本月已见过</span>':''}
        </div>`;
      el.appendChild(c);
    });
  }
  if(t==="rank"){
    const rows = S.rivals.map(r=>({name:r.name, boss:r.boss, style:r.style, dep:r.dep, me:false}));
    rows.push({name:"江北支行", boss:S.playerName, style:"看你的", dep:S.dep, me:true});
    rows.sort((a,b)=>b.dep-a.dep);
    let html = `<table><tr><th>#</th><th>支行</th><th>行长</th><th>打法</th><th>存款</th></tr>`;
    rows.forEach((r,i)=>{
      html += `<tr class="${r.me?"me":""}"><td>${i+1}</td><td>${r.name}</td><td>${r.boss}</td><td>${r.style}</td><td>${fmt(r.dep)}亿</td></tr>`;
    });
    html += `</table><div class="sub" style="margin-top:8px">狼性、灰色打法的对手冲得快,但有概率爆雷倒退——他们摔跟头时,客户会流到你这来。</div>`;
    el.innerHTML = html;
  }
  if(t==="log"){
    const box = document.createElement("div"); box.className="log";
    S.log.slice(0,80).forEach(l=>{
      const p = document.createElement("p");
      p.className = l.cls||"";
      p.innerHTML = l.txt;
      box.appendChild(p);
    });
    el.appendChild(box);
  }
}
function renderAll(){
  renderStats(); renderEnergy(); renderForecast(); renderActions(); renderPanel();
  save();
}

/* ============ 引导 & 存档 ============ */
function showIntro(){
  showModal("上任第一天",
`三年,36个月。存款从10亿往上做,排名从第7往前挪。这是全部目标。

每月3点精力,五个行动随便点。月底按『结束本月』收账。

只需要记住三句话:
· 存款靠网点和关系——派好主任,处好那6个人。
· 士气和口碑是放大器,别让它们烂掉。
· 风险到85,审计组直接送你走。别贪。`,
    [{t:"上任", s:"祝你官运亨通"}]);
}
function save(){
  if(S && !S.over){
    try{ localStorage.setItem("jbzh_save4", JSON.stringify(S)); }catch(e){}
  }
}
function load(){
  try{
    const d = localStorage.getItem("jbzh_save4");
    if(d){ S = JSON.parse(d); renderAll(); return true; }
  }catch(e){}
  return false;
}

/* ============ 启动 ============ */
$("#btnEnd").onclick = ()=>{
  if(S.over) return;
  if(S.energy>0){
    showModal("还有精力没用","还剩"+S.energy+"点精力,真要跳过?",[
      {t:"跳过,直接结算", fn:()=>endMonth()},
      {t:"回去再干点活", fn:()=>{}},
    ]);
  } else endMonth();
};
document.querySelectorAll("#tabBar button").forEach(b=>{
  b.onclick = ()=>switchTab(b.dataset.tab);
});
document.addEventListener("click", ()=>{ document.querySelectorAll(".stat.tipOn").forEach(x=>x.classList.remove("tipOn")); });
window.assignMgr = assignMgr; window.recallMgr = recallMgr;
window.fireEmp = fireEmp; window.doSocial = doSocial; window.upgradeDeco = upgradeDeco;
window.trainEmp = trainEmp; window.restartGame = restartGame;

if(!load()) newGame();
</script>
