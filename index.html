      function maybeQueueSpecificEvent(state, eventId, probability) {
        if (state.pendingEvents.includes(eventId)) return;
        const event = EVENTS.find((item) => item.id === eventId);
        if (!event) return;
        if (state.cooldowns[event.id] > 0) return;
        if (event.condition && !event.condition(state)) return;
        if (Math.random() < probability) state.pendingEvents.push(event.id);
      }

      function maybeQueueActionEvent(state, action) {
        if (action.category === "权谋手腕" && action.route === "gray" && maxRisk(state) > 52) {
          maybeQueueSpecificEvent(state, state.hiddenRisks.integrity > 58 ? "integrity_talk" : "compliance_audit_notice", 0.18);
        }
        if (action.id === "push_loans" || action.id === "illegal_lending" || action.id === "hide_npl") {
          maybeQueueSpecificEvent(state, "npl_loan_explosion", 0.12);
        }
        if (action.id === "staff_talk") {
          state.employees.slice(0, 3).forEach((employee) => {
            employee.loyalty = clamp(employee.loyalty + 1, 0, 100);
          });
        }
      }

      function weightedPick(items) {
        const total = items.reduce((sum, item) => sum + (item.weight || 1), 0);
        let roll = Math.random() * total;
        for (const item of items) {
          roll -= item.weight || 1;
          if (roll <= 0) return item;
        }
        return items[0];
      }

      function queueWeeklyEvents(state) {
        if (state.pendingEvents.length >= 2) return;
        const eligible = EVENTS.filter((event) => {
          if (!event.repeatable && state.triggeredEvents.some((item) => item.id === event.id)) return false;
          if (state.cooldowns[event.id] > 0) return false;
          return !event.condition || event.condition(state);
        });
        const riskBoost = maxRisk(state) / 420;
        const chanceValue = clamp(0.16 + riskBoost, 0.12, 0.42);
        if (eligible.length && Math.random() < chanceValue) {
          state.pendingEvents.push(weightedPick(eligible).id);
        }
        const riskMap = [
          ["compliance", 60, "compliance_audit_notice"],
          ["integrity", 60, "integrity_talk"],
          ["integrity", 85, "integrity_talk"],
          ["npl", 70, "npl_loan_explosion"],
          ["publicOpinion", 70, "media_complaint"],
          ["employee", 70, "employee_whistle_signal"],
          ["health", 80, "health_alarm"],
          ["fundStability", 70, "large_fund_outflow"]
        ];
        for (const [key, threshold, eventId] of riskMap) {
          if (state.pendingEvents.length >= 2) break;
          const value = state.hiddenRisks[key];
          if (value > threshold && Math.random() < clamp((value - threshold) / 90, 0.08, 0.45)) {
            maybeQueueSpecificEvent(state, eventId, 1);
          }
        }
      }

      function chooseEventOption(state, eventId, optionIndex) {
        const event = EVENTS.find((item) => item.id === eventId);
        if (!event) return { ok: false, message: "事件不存在。" };
        const option = event.options[optionIndex];
        if (!option) return { ok: false, message: "事件选项不存在。" };
        applyEffect(state, effectFromObject(option.effect)(state), event.title);
        state.triggeredEvents.push({ id: event.id, week: state.week, option: optionIndex });
        state.cooldowns[event.id] = event.cooldownWeeks || 8;
        state.pendingEvents = state.pendingEvents.filter((id, index) => id !== eventId || index !== 0);
        if (event.id === "integrity_talk" && state.hiddenRisks.integrity > 78) state.flags.integrityInvestigations += 1;
        if (["npl_loan_explosion", "large_fund_outflow", "media_complaint", "compliance_audit_notice", "integrity_talk"].includes(event.id)) {
          state.flags.riskExplosions += 1;
        }
        clampState(state);
        saveGame(state, true);
        return { ok: true };
      }

      function weeklyDrift(state) {
        applyIdleStaffPressure(state);
        // 网点产出是自然增长的主引擎（占大头）
        processOutlets(state);
        // 总部直营/直接业务只占一小部分残余增长
        const moraleDrag = state.branch.morale < 30 ? -0.05 : 0.01;
        const abilityLift = (state.branch.teamAbility - 45) / 2600;
        const relationLift = (state.branch.localRelation - 30) / 3000;
        const stressHealth = state.player.pressure > 65 ? -2 : state.player.pressure > 50 ? -1 : 0;
        state.branch.deposit += round(0.008 + moraleDrag + relationLift, 3);
        state.branch.loan += round(0.006 + abilityLift, 3);
        state.branch.incomeRate += round(0.04 + abilityLift * 8, 3);
        state.branch.nplRate += round(Math.max(0, state.hiddenRisks.npl - state.branch.teamAbility) / 1600, 3);
        state.player.health += stressHealth;
        state.hiddenRisks.health += state.player.pressure > 60 ? 2 : -1;
        state.hiddenRisks.employee += state.branch.morale < 32 ? 2 : -1;
        state.hiddenRisks.fundStability -= 1;
        state.player.pressure += state.branch.rank > 6 ? 1 : -1;
        // 机会池转化：走访/营销/拜访攒下的机会，靠队伍逐周谈成存贷款；没跟进的线索会较快过期流失
        const closeRate = 0.006 + (state.branch.teamAbility / 100) * 0.008;
        const custConv = Math.min(0.18, round(state.branch.customerOpportunities * closeRate, 3));
        const loanConv = Math.min(0.14, round(state.branch.loanOpportunities * closeRate, 3));
        const govConv = Math.min(0.12, round(state.branch.governmentProjects * 0.014, 3));
        state.branch.deposit += round(custConv + govConv * 0.7, 3);
        state.branch.loan += round(loanConv, 3);
        state.branch.incomeRate += round((custConv + loanConv) * 0.4, 3);
        state.branch.customerOpportunities = Math.max(0, round(state.branch.customerOpportunities * 0.86 - custConv, 2));
        state.branch.loanOpportunities = Math.max(0, round(state.branch.loanOpportunities * 0.86 - loanConv, 2));
        state.branch.governmentProjects = Math.max(0, round(state.branch.governmentProjects * 0.93 - govConv, 2));
        Object.keys(state.cooldowns).forEach((key) => {
          state.cooldowns[key] = Math.max(0, state.cooldowns[key] - 1);
        });
        clampState(state);
      }

      function getNextWeekActionPoints(state) {
        let points = BASE_ACTION_POINTS;
        if (state.player.health < 25) points -= 2;
        else if (state.player.health < 40) points -= 1;
        if (state.pendingEvents.includes("health_alarm")) points -= 1;
        return clamp(points, 6, BASE_ACTION_POINTS);
      }

      function monthOfYear(week) {
        const weekInYear = ((week - 1) % 52) + 1;
        const quarterInYear = Math.ceil(weekInYear / 13);
        const wq = ((week - 1) % 13) + 1;
        const monthInQuarter = wq <= 4 ? 1 : (wq <= 9 ? 2 : 3);
        return (quarterInYear - 1) * 3 + monthInQuarter;
      }

      function isMonthEnd(week) {
        const wq = ((week - 1) % 13) + 1;
        return wq === 4 || wq === 9 || wq === 13;
      }

      function outletMonthlyRent(state) {
        if (!Array.isArray(state.outlets)) return 0;
        return round(state.outlets.reduce((s, o) => s + (o.rentCost || 0), 0) * 0.035, 1);
      }

      function settleMonth(state) {
        state.branch.lastRank = state.branch.rank;
        evolveCompetitors(state);
        processPayroll(state);
        // 网点月度租金（开得越多越重）
        const rent = outletMonthlyRent(state);
        if (rent > 0) {
          if (state.branch.marketingBudget >= rent) {
            state.branch.marketingBudget -= rent;
          } else {
            const gap = rent - state.branch.marketingBudget;
            state.branch.marketingBudget = 0;
            state.branch.incomeRate = Math.max(0, round(state.branch.incomeRate - gap * 0.12, 2));
          }
        }
        const report = {
          week: state.week,
          title: "第" + state.year + "年 第" + monthOfYear(state.week) + "月小结",
          deposit: round(state.branch.deposit, 2),
          loan: round(state.branch.loan, 2),
          incomeRate: round(state.branch.incomeRate, 1),
          nplRate: round(state.branch.nplRate, 2),
          morale: round(state.branch.morale, 1),
          risk: riskBand(maxRisk(state)).label,
          rank: state.branch.rank
        };
        state.monthlyReports.unshift(report);
        state.monthlyReports = state.monthlyReports.slice(0, 18);
        addLog(state, "月度小结", "本月排名第" + report.rank + "名，风险状态：" + report.risk + "。", "report");
      }

      function settleQuarter(state) {
        allotSalaryBudget(state);
        const score =
          (10 - state.branch.rank) * 7 +
          state.branch.incomeRate * 0.5 +
          state.branch.morale * 0.22 +
          state.player.leaderImpression * 0.24 -
          state.branch.nplRate * 5 -
          Math.max(0, maxRisk(state) - 60) * 0.45;
        let result = "正常";
        if (score >= 96) result = "红榜";
        else if (score < 48) result = "黑榜";
        else if (score < 65) result = "黄榜";
        const effect = result === "红榜"
          ? { player: { leaderImpression: 5, pressure: -5 }, branch: { marketingBudget: 10, morale: 4 }, hiddenRisks: { leaderAttention: -3 } }
          : result === "黑榜"
            ? { player: { leaderImpression: -7, pressure: 9 }, branch: { morale: -5 }, hiddenRisks: { leaderAttention: 8, employee: 4 } }
            : result === "黄榜"
              ? { player: { leaderImpression: -2, pressure: 4 }, branch: { morale: -2 }, hiddenRisks: { leaderAttention: 3 } }
              : { player: { leaderImpression: 1, pressure: 1 } };
        if (result === "黑榜") state.flags.consecutiveBlackQuarters += 1;
        else state.flags.consecutiveBlackQuarters = 0;
        applyEffect(state, effect, "季度考核");
        state.quarterlyResults.unshift({
          week: state.week,
          year: state.year,
          quarter: Math.ceil(((state.week - 1) % 52 + 1) / 13),
          result: result,
          rank: state.branch.rank,
          score: round(score, 1)
        });
        state.quarterlyResults = state.quarterlyResults.slice(0, 14);
        addLog(state, "季度考核：" + result, "分行通报落地，江北区支行当前排名第" + state.branch.rank + "名。", "report");
      }

      function settleHalfYear(state) {
        state.branch.marketingBudget += 12;
        state.player.pressure += 6;
        state.hiddenRisks.leaderAttention += 8;
        state.hiddenRisks.fundStability += 5;
        addLog(state, "半年冲刺", "分行进入半年冲刺节奏。存款权重提高，所有人都开始看时点。", "report");
        clampState(state);
      }

      function settleYear(state) {
        const score =
          (10 - state.branch.rank) * 8 +
          state.branch.deposit * 1.4 +
          state.branch.loan * 1.2 +
          state.branch.incomeRate * 0.42 +
          state.branch.morale * 0.24 +
          state.player.leaderImpression * 0.32 -
          state.branch.nplRate * 6 -
          maxRisk(state) * 0.2;
        let grade = "C";
        if (score >= 145) grade = "S";
        else if (score >= 122) grade = "A";
        else if (score >= 96) grade = "B";
        else if (score < 55) grade = "E";
        else if (score < 75) grade = "D";
        const effect = grade === "S"
          ? { player: { leaderImpression: 8, pressure: -8 }, branch: { salaryPool: 45, marketingBudget: 20, morale: 6 } }
          : grade === "A"
            ? { player: { leaderImpression: 5, pressure: -4 }, branch: { salaryPool: 25, marketingBudget: 12, morale: 3 } }
            : grade === "D" || grade === "E"
              ? { player: { leaderImpression: -8, pressure: 10 }, branch: { morale: -7 }, hiddenRisks: { leaderAttention: 10, employee: 5 } }
              : { player: { leaderImpression: 1, pressure: 2 } };
        if (grade === "S") state.flags.annualSCount += 1;
        applyEffect(state, effect, "年度考核");
        state.yearlyResults.unshift({
          week: state.week,
          year: state.year,
          grade: grade,
          score: round(score, 1),
          rank: state.branch.rank
        });
        state.yearlyResults = state.yearlyResults.slice(0, 4);
        addLog(state, "年度考核：" + grade, "这一年的账算完了。结果是" + grade + "，排名第" + state.branch.rank + "名。", "report");
      }

      function endWeek(state) {
        if (state.flags.ended || state.ending) return { ok: false, message: "任期已经结束。" };
        weeklyDrift(state);
        if (isMonthEnd(state.week)) settleMonth(state);
        if (state.week % 13 === 0) settleQuarter(state);
        if (HALF_YEAR_WEEKS.includes(state.week)) settleHalfYear(state);
        if (state.week % 52 === 0) settleYear(state);
        queueWeeklyEvents(state);
        if (state.week >= TOTAL_WEEKS) {
          state.ending = evaluateEnding(state);
          state.flags.ended = true;
          addLog(state, "任期结算：" + state.ending.title, state.ending.text, "ending");
          saveGame(state, true);
          return { ok: true, ended: true, ending: state.ending };
        }
        state.week += 1;
        state.year = Math.min(3, Math.ceil(state.week / 52));
        state.actionPoints = getNextWeekActionPoints(state);
        addLog(state, "进入第" + state.week + "周", "新的一周开始，行动点恢复为" + state.actionPoints + "点。", "system");
        clampState(state);
        saveGame(state, true);
        return { ok: true };
      }

      function evaluateEnding(state) {
        const risk = maxRisk(state);
        const branch = state.branch;
        const player = state.player;
        if (player.health <= 8 || state.hiddenRisks.health >= 96) return ENDINGS.health_collapse;
        if (state.hiddenRisks.integrity >= 90 || state.flags.integrityInvestigations >= 2 || (state.hiddenRisks.integrity > 78 && state.hiddenRisks.compliance > 78 && state.routeScores.gray > 12)) {
          return ENDINGS.prison;
        }
        if (state.hiddenRisks.compliance >= 92 || state.hiddenRisks.publicOpinion >= 92 || state.flags.riskExplosions >= 8) return ENDINGS.fired;
        if (branch.rank <= 2 && branch.deposit >= 30 && branch.loan >= 19 && branch.incomeRate >= 95 && branch.nplRate <= 2.8 && branch.morale >= 54 && player.leaderImpression >= 70 && risk < 74) {
          return ENDINGS.star_president;
        }
        if (branch.rank <= 2 && branch.deposit >= 30 && branch.loan >= 19 && player.leaderImpression >= 72 && state.routeScores.relation + state.routeScores.official + state.routeScores.gray >= 14) {
          return ENDINGS.northern_king;
        }
        if (branch.nplRate <= 2.5 && state.hiddenRisks.npl < 40 && state.hiddenRisks.compliance < 48 && state.routeScores.reform >= 14) {
          return ENDINGS.iron_risk;
        }
        if (branch.nplRate >= 6 || branch.morale < 18 || state.flags.consecutiveBlackQuarters >= 3) return ENDINGS.demoted;
        if (branch.rank >= 8 && player.leaderImpression < 38 && branch.deposit < 24 && branch.loan < 17) return ENDINGS.back_office;
        return ENDINGS.stable_survivor;
      }

      function saveGame(state, autosave) {
        if (!state) return false;
        try {
          if (!autosave) addLog(state, "手动存档", "档案柜合上时，纸页发出很轻的一声响。", "system");
          state.lastSavedAt = new Date().toISOString();
          window.localStorage.setItem(SAVE_KEY, JSON.stringify(state));
          return true;
        } catch (error) {
          return false;
        }
      }

      function loadGame() {
        try {
          const raw = window.localStorage.getItem(SAVE_KEY);
          if (!raw) return null;
          const state = JSON.parse(raw);
          return hydrateState(state);
        } catch (error) {
          return null;
        }
      }

      function hydrateState(state) {
        const fresh = createInitialState(state && state.seed ? state.seed : Date.now());
        const merged = Object.assign(fresh, state || {});
        merged.branch = Object.assign(fresh.branch, state.branch || {});
        merged.player = Object.assign(fresh.player, state.player || {});
        merged.hiddenRisks = Object.assign(fresh.hiddenRisks, state.hiddenRisks || {});
        merged.riskIntel = state.riskIntel && typeof state.riskIntel === "object" ? state.riskIntel : {};
        merged.routeScores = Object.assign(fresh.routeScores, state.routeScores || {});
        merged.flags = Object.assign(fresh.flags, state.flags || {});
        merged.employees = Array.isArray(state.employees) ? state.employees : fresh.employees;
        merged.employeePool = Array.isArray(state.employeePool) ? state.employeePool : fresh.employeePool;
        merged.positionSlots = Array.isArray(state.positionSlots) ? state.positionSlots : fresh.positionSlots;
        merged.contacts = Array.isArray(state.contacts) ? state.contacts : fresh.contacts;
        merged.contactIntel = state.contactIntel && typeof state.contactIntel === "object" ? state.contactIntel : {};
        merged.competitors = Array.isArray(state.competitors) && state.competitors.length ? state.competitors : fresh.competitors;
        merged.outlets = Array.isArray(state.outlets) ? state.outlets : fresh.outlets;
        merged.logs = Array.isArray(state.logs) ? state.logs : fresh.logs;
        merged.triggeredEvents = Array.isArray(state.triggeredEvents) ? state.triggeredEvents : [];
        merged.pendingEvents = Array.isArray(state.pendingEvents) ? state.pendingEvents : [];
        merged.cooldowns = state.cooldowns || {};
        merged.quarterlyResults = Array.isArray(state.quarterlyResults) ? state.quarterlyResults : [];
        merged.yearlyResults = Array.isArray(state.yearlyResults) ? state.yearlyResults : [];
        merged.monthlyReports = Array.isArray(state.monthlyReports) ? state.monthlyReports : [];
        ensureOrgStructure(merged);
        clampState(merged);
        return merged;
      }

      function deleteSave() {
        window.localStorage.removeItem(SAVE_KEY);
      }

      function hasSave() {
        return !!window.localStorage.getItem(SAVE_KEY);
      }

      function getOverallRiskStatus(state) {
        return riskBand(maxRisk(state));
      }

      window.BankGame = {
        SAVE_KEY,
        TOTAL_WEEKS,
        ACTIONS,
        EVENTS,
        ENDINGS,
        ACTION_CATEGORIES,
        POSITION_DEFS,
        CONTACT_DEFS,
        COMPETITOR_DEFS,
        SOCIAL_ACTIONS,
        createInitialState,
        applyAction,
        applySocialAction,
        isSocialAction,
        socialContactsFor,
        getRanking,
        computeBranchScore,
        branchScoreBreakdown,
        evolveCompetitors,
        monthlyPayroll,
        monthlySalary,
        branchOutletOutput,
        outletWeeklyOutput,
        getOutletManager,
        outletMonthlyRent,
        openOutlet,
        openOutletCost,
        availableOutletLocations,
        OUTLET_LOCATIONS,
        OUTLET_CAP,
        processPayroll,
        allotSalaryBudget,
        monthOfYear,
        isMonthEnd,
        contactKnownLevel,
        knownPreferences,
        endWeek,
        evaluateEnding,
        chooseEventOption,
        getOpenSlots,
        getIdleEmployees,
        getContactsByGroup,
        adjustContactFavor,
        promoteEmployeeToSlot,
        demoteEmployeeFromSlot,
        recruitCandidate,
        applyIdleStaffPressure,
        saveGame,
        loadGame,
        deleteSave,
        hasSave,
        employeeOperation,
        outletOperation,
        getActionById,
        getOverallRiskStatus,
        riskBand
      };

      const App = (function () {
        let state = null;
        let activeTab = "actions";
        let activeCategory = "业务经营";
        let staffSubTab = "team";

        function $(id) {
          return document.getElementById(id);
        }

        function setScreen(id) {
          ["homeScreen", "gameScreen", "endingScreen"].forEach((screenId) => {
            const node = $(screenId);
            if (node) node.classList.toggle("active", screenId === id);
          });
        }

        function start() {
          bindStaticEvents();
          renderHome();
        }

        function bindStaticEvents() {
          $("newGameBtn").addEventListener("click", () => {
            if (hasSave()) {
              openModal({
                title: "覆盖旧存档",
                body: "档案柜里已有一份江北区支行任期记录。新的任命会覆盖它。",
                options: [
                  { text: "开始新游戏", hint: "覆盖当前存档。", action: () => startNewGame() },
                  { text: "先不动", hint: "回到首页。", action: closeModal }
                ]
              });
            } else {
              startNewGame();
            }
          });
          $("continueBtn").addEventListener("click", () => {
            const loaded = loadGame();
            if (!loaded) return;
            state = loaded;
            if (state.ending) renderEnding();
            else renderGame();
          });
          $("saveBtn").addEventListener("click", () => {
            saveGame(state, false);
            renderGame();
            toast("已手动保存");
          });
          $("endWeekBtn").addEventListener("click", () => {
            const result = endWeek(state);
            if (result && result.ended) {
              renderEnding();
              return;
            }
            renderGame();
            showNextEventIfAny();
          });
          $("endingNewBtn").addEventListener("click", startNewGame);
          $("endingHomeBtn").addEventListener("click", () => {
            renderHome();
            setScreen("homeScreen");
          });
        }

        function renderHome() {
          $("continueBtn").disabled = !hasSave();
        }

        function startNewGame() {
          state = createInitialState(Date.now());
          saveGame(state, true);
          closeModal();
          renderGame();
        }

        function renderGame() {
          if (!state) return;
          if (state.ending) {
            renderEnding();
            return;
          }
          setScreen("gameScreen");
          renderTopbar();
          renderMetrics();
          renderTabs();
          renderPanel();
          renderHome();
        }

        function renderTopbar() {
          const weeksToQuarter = 13 - ((state.week - 1) % 13);
          $("weekLine").textContent = "第" + state.year + "年 第" + state.week + "周 · 距季度考核 " + weeksToQuarter + " 周";
          const risk = getOverallRiskStatus(state);
          const trendMark = state.branch.rankTrend > 0 ? " ▲" : (state.branch.rankTrend < 0 ? " ▼" : "");
          const items = [
            ["行动点", state.actionPoints + "/10"],
            ["排名", "第" + state.branch.rank + "/9" + trendMark],
            ["季度", weeksToQuarter + "周"],
            ["风险", risk.label],
            ["经营成本", asMoney(state.branch.marketingBudget)],
            ["工资池", asMoney(state.branch.salaryPool)],
            ["健康", pct(state.player.health)],
            ["压力", pct(state.player.pressure)]
          ];
          $("statusStrip").innerHTML = items.map(([label, value]) => (
            '<div class="status-cell"><span class="status-label">' + label + '</span><span class="status-value">' + value + '</span></div>'
          )).join("");
        }

        function renderMetrics() {
          const metrics = [
            ["存款规模", round(state.branch.deposit, 2) + "亿", "初始18亿，季末权重高"],
            ["贷款规模", round(state.branch.loan, 2) + "亿", "规模越快，风控越要跟上"],
            ["收入完成率", pct(state.branch.incomeRate), "年度评级核心指标"],
            ["不良率", pct(state.branch.nplRate), "越低越好"],
            ["员工士气", pct(state.branch.morale), "影响行动效率和离职"],
            ["团队能力", pct(state.branch.teamAbility), "影响营销、风控、合规"],
            ["岗位空缺", getOpenSlots(state).length + "个", "管理/骨干岗位有限编制"],
            ["待岗人员", getIdleEmployees(state).length + "人", "持续消耗工资池"],
            ["地方关系", pct(state.branch.localRelation), "影响政府和机构客户"],
            ["领导印象", pct(state.player.leaderImpression), "影响资源和结局"],
            ["健康", pct(state.player.health), state.player.health < 40 ? "下周行动点会受影响" : "身体还扛得住"],
            ["风险体感", getOverallRiskStatus(state).label, "细项需到风控页自查"]
          ];
          $("metricsGrid").innerHTML = metrics.map(([name, value, note]) => (
            '<article class="metric-card"><div class="metric-name">' + name + '</div><div class="metric-value">' + value + '</div><div class="metric-note">' + note + '</div></article>'
          )).join("");
        }

        function getMaxRiskKey(current) {
          return Object.keys(current.hiddenRisks).sort((a, b) => current.hiddenRisks[b] - current.hiddenRisks[a])[0];
        }

        function renderTabs() {
          $("tabbar").innerHTML = TABS.map((tab) => (
            '<button class="tab-button ' + (activeTab === tab.id ? "active" : "") + '" data-tab="' + tab.id + '">' + tab.label + '</button>'
          )).join("");
          $("tabbar").querySelectorAll("button").forEach((button) => {
            button.addEventListener("click", () => {
              activeTab = button.dataset.tab;
              renderGame();
            });
          });
        }

        function renderPanel() {
          const renderers = {
            actions: renderActions,
            staff: renderStaff,
            outlets: renderOutlets,
            ranking: renderRanking,
            data: renderData,
            risks: renderRisks,
            reports: renderReports,
            logs: renderLogs,
            save: renderSave
          };
          renderers[activeTab]();
        }

        function renderActions() {
          const actions = ACTIONS.filter((action) => action.category === activeCategory);
          $("panelContent").innerHTML =
            '<div class="panel-title-row"><h2>本周行动</h2><div class="panel-meta">剩余 ' + state.actionPoints + ' 点</div></div>' +
            '<div class="action-layout"><div class="category-tabs">' +
            ACTION_CATEGORIES.map((category) => '<button class="category-button ' + (category === activeCategory ? "active" : "") + '" data-category="' + category + '">' + category + '</button>').join("") +
            '</div><div class="list">' +
            actions.map(renderActionCard).join("") +
            '</div></div>';
          $("panelContent").querySelectorAll(".category-button").forEach((button) => {
            button.addEventListener("click", () => {
              activeCategory = button.dataset.category;
              renderGame();
            });
          });
          $("panelContent").querySelectorAll("[data-action-id]").forEach((button) => {
            button.addEventListener("click", () => confirmAction(button.dataset.actionId));
          });
        }

        function renderActionCard(action) {
          const disabled = state.actionPoints < action.cost || state.branch.marketingBudget < (action.budgetCost || 0);
          const badges = [
            '<span class="badge gold">' + action.cost + '行动点</span>',
            action.budgetCost ? '<span class="badge orange">' + asMoney(action.budgetCost) + '</span>' : '<span class="badge green">无费用</span>',
            isSocialAction(action.id) ? '<span class="badge blue">点选人物</span>' : ''
          ].join("");
          return '<article class="action-card">' +
            '<div class="item-head"><div><h3 class="item-title">' + action.name + '</h3><p class="item-subtitle">' + action.description + '</p></div></div>' +
            '<div class="badges">' + badges + '</div>' +
            '<div class="item-actions"><button class="btn" data-action-id="' + action.id + '" ' + (disabled ? "disabled" : "") + '>执行</button></div>' +
            '</article>';
        }

        function confirmAction(actionId) {
          const action = getActionById(actionId);
          if (!action) return;
          if (isSocialAction(actionId)) return openSocialPicker(actionId);
          openModal({
            title: action.name,
            body: action.description + '<br><br><strong>消耗：</strong>' + action.cost + '行动点' + (action.budgetCost ? "，经营成本" + asMoney(action.budgetCost) : "。") + '<br><span style="color:var(--muted)">结果要执行后才见分晓。</span>',
            options: [
              {
                text: "确认执行",
                hint: "本周剩余行动点会立即扣除。",
                action: () => {
                  closeModal();
                  const result = withFeedback(action.name, () => applyAction(state, action.id));
                  renderGame();
                  showNextEventIfAny();
                }
              },
              { text: "再想想", hint: "不消耗行动点。", action: closeModal }
            ]
          });
        }

        function openSocialPicker(actionId) {
          const action = getActionById(actionId);
          const contacts = socialContactsFor(state, actionId);
          if (!contacts.length) return toast("暂时没有可以点选的对象。");
          const runOn = (contactId) => {
            closeModal();
            const contact = state.contacts.find((c) => c.id === contactId);
            const result = withFeedback(action.name + "·" + (contact ? contact.name : ""), () => applySocialAction(state, actionId, contactId));
            renderGame();
            if (result.ok) showNextEventIfAny();
          };
          const costLine = action.cost + '行动点' + (action.budgetCost ? '，经营成本' + asMoney(action.budgetCost) : '');
          if (contacts.length === 1) {
            const c = contacts[0];
            return openModal({
              title: action.name + "：" + c.name,
              body: c.title + " · 当前好感 " + c.favor + " · 偏好：" + knownPreferences(state, c) + "<br><br>" + action.description + "<br><strong>消耗：</strong>" + costLine + "。好感越高，这次收益越大。",
              options: [
                { text: "确认执行", hint: "好感会随之变化。", action: () => runOn(c.id) },
                { text: "再想想", hint: "不消耗行动点。", action: closeModal }
              ]
            });
          }
          openModal({
            title: action.name + "：点选对象",
            body: "选择对象。摸清的人能投其所好，没摸透的只能先试——试对试错，都会让你更了解他。<br><strong>消耗：</strong>" + costLine + "。",
            options: contacts.map((c) => ({
              text: c.name + " · " + c.group + " · 好感" + c.favor,
              hint: c.title + " · 偏好：" + knownPreferences(state, c),
              action: () => runOn(c.id)
            })).concat([{ text: "取消", hint: "不消耗行动点。", action: closeModal }])
          });
        }

        function renderStaff() {
          const positions = state.positionSlots.filter((slot) => slot.managed);
          const openSlots = positions.filter((slot) => !slot.employeeId);
          const idleEmployees = getIdleEmployees(state);
          const visible = state.employees.filter((employee) => employee.assignmentStatus !== "待岗").slice(0, 18);
          const candidates = state.employeePool.slice(0, 8);
          const payroll = monthlyPayroll(state);
          const pool = state.branch.salaryPool;
          const payTone = pool < payroll ? "red" : (pool < payroll * 2 ? "orange" : "green");
          const subBar =
            '<div class="category-tabs">' +
            '<button class="category-button ' + (staffSubTab === "team" ? "active" : "") + '" data-staff-sub="team">我的队伍</button>' +
            '<button class="category-button ' + (staffSubTab === "market" ? "active" : "") + '" data-staff-sub="market">人才市场</button>' +
            '</div>';
          let body;
          if (staffSubTab === "market") {
            body =
              '<div class="panel-title-row"><h2>人才市场</h2><div class="panel-meta">外部候选 · 有对应空缺直接补岗，否则进待岗</div></div>' +
              '<div class="list">' + (candidates.length ? candidates.map(renderCandidateCard).join("") : '<div class="empty">暂无候选。</div>') + '</div>';
          } else {
            body =
              '<article class="report-card"><div class="item-head"><div><h3 class="item-title">工资总额</h3><p class="item-subtitle">每月按全员薪资发薪，季度按业绩核拨</p></div><span class="badge ' + payTone + '">池 ' + asMoney(pool) + '</span></div>' +
              '<div class="inline-grid">' + tiny("工资池", asMoney(pool)) + tiny("月度发薪", asMoney(payroll)) + tiny("可撑月数", payroll > 0 ? Math.floor(pool / payroll) + "月" : "—") + tiny("人均月薪", state.employees.length ? asMoney(monthlySalary(state.employees.reduce((s, e) => s + (e.salary || 0), 0) / state.employees.length)) : "—") + '</div>' +
              (pool < payroll ? '<p class="item-body" style="color:var(--red)">工资池已不够发下月工资，需尽快争取工资总额或压减队伍，否则士气崩、骨干流失。</p>' : '') + '</article>' +
              '<div class="panel-title-row"><h2>岗位编制</h2><div class="panel-meta">管理/骨干岗位有限编制</div></div>' +
              '<div class="list staff-list">' + positions.map(renderPositionCard).join("") + '</div>' +
              (idleEmployees.length ? '<div class="panel-title-row"><h2>待岗人员</h2><div class="panel-meta">持续消耗工资池并增加员工风险</div></div><div class="list staff-list">' + idleEmployees.map(renderEmployeeCard).join("") + '</div>' : '') +
              '<div class="panel-title-row"><h2>在岗名单</h2><div class="panel-meta">显示前18人</div></div>' +
              '<div class="list staff-list">' + visible.map(renderEmployeeCard).join("") + '</div>';
          }
          $("panelContent").innerHTML =
            '<div class="panel-title-row"><h2>员工管理</h2><div class="panel-meta">' + state.employees.length + '人 · 空缺' + openSlots.length + '个 · 待岗' + idleEmployees.length + '人</div></div>' +
            subBar + body;
          $("panelContent").querySelectorAll("[data-staff-sub]").forEach((button) => {
            button.addEventListener("click", () => { staffSubTab = button.dataset.staffSub; renderGame(); });
          });
          $("panelContent").querySelectorAll("[data-assign-slot]").forEach((button) => {
            button.addEventListener("click", () => openAssignModal(button.dataset.assignSlot));
          });
          $("panelContent").querySelectorAll("[data-demote-employee]").forEach((button) => {
            button.addEventListener("click", () => {
              const emp = getEmployeeById(state, button.dataset.demoteEmployee);
              withFeedback("免职腾位" + (emp ? "·" + emp.name : ""), () => employeeOperation(state, button.dataset.demoteEmployee, "demote"));
              renderGame();
            });
          });
          $("panelContent").querySelectorAll("[data-employee-op]").forEach((button) => {
            button.addEventListener("click", () => {
              const emp = getEmployeeById(state, button.dataset.employeeId);
              const opName = { talk: "谈心", train: "培训", cultivate: "重点培养", raise: "加薪", dismiss: "开除" }[button.dataset.employeeOp] || "员工管理";
              withFeedback(opName + (emp ? "·" + emp.name : ""), () => employeeOperation(state, button.dataset.employeeId, button.dataset.employeeOp));
              renderGame();
            });
          });
          $("panelContent").querySelectorAll("[data-candidate-index]").forEach((button) => {
            button.addEventListener("click", () => {
              confirmRecruitCandidate(Number(button.dataset.candidateIndex));
            });
          });
        }

        function renderPositionCard(slot) {
          const employee = slot.employeeId ? getEmployeeById(state, slot.employeeId) : null;
          const body = employee
            ? employee.name + ' · ' + employee.type + ' · 管理' + employee.management + ' / 忠诚' + employee.loyalty + ' · 月薪' + asMoney(monthlySalary(employee.salary))
            : '空缺。可以从待岗人员、重点培养对象或在岗骨干中任命。';
          return '<article class="staff-card">' +
            '<div class="item-head"><div><h3 class="item-title">' + slot.title + '</h3><p class="item-subtitle">' + slot.role + (slot.department ? ' · ' + slot.department : '') + (slot.outlet ? ' · ' + slot.outlet : '') + '</p></div><span class="badge ' + (employee ? "green" : "orange") + '">' + (employee ? "在编" : "空缺") + '</span></div>' +
            '<p class="item-body">' + body + '</p>' +
            '<div class="item-actions">' +
            (employee ? '<button class="btn warning" data-demote-employee="' + employee.id + '">免职腾位</button>' : '<button class="btn" data-assign-slot="' + slot.id + '">任命人员</button>') +
            '</div></article>';
        }

        function renderCandidateCard(employee, index) {
          const openSlot = getOpenSlots(state, employee.role)[0];
          return '<article class="staff-card">' +
            '<div class="item-head"><div><h3 class="item-title">候选：' + employee.name + '</h3><p class="item-subtitle">' + employee.role + ' · ' + employee.type + ' · 期望月薪' + asMoney(monthlySalary(employee.expectedSalary)) + '</p></div><span class="badge ' + (openSlot ? "green" : "orange") + '">' + (openSlot ? "可补岗" : "会待岗") + '</span></div>' +
            '<div class="inline-grid">' + tiny("营销", employee.marketing) + tiny("风控", employee.riskControl) + tiny("忠诚", employee.loyalty) + tiny("野心", employee.ambition) + '</div>' +
            '<div class="item-actions"><button class="btn secondary" data-candidate-index="' + index + '" ' + (state.actionPoints < 3 || state.branch.salaryPool < Math.round(employee.expectedSalary * 0.5) ? "disabled" : "") + '>' + (openSlot ? "招聘上岗" : "招聘待岗") + '</button></div>' +
            '</article>';
        }

        function renderEmployeeCard(employee) {
          const assignment = employee.assignmentStatus || "在岗";
          return '<article class="staff-card">' +
            '<div class="item-head"><div><h3 class="item-title">' + employee.name + '</h3><p class="item-subtitle">' + employee.role + ' · ' + employee.type + ' · ' + employee.outlet + ' · 月薪' + asMoney(monthlySalary(employee.salary)) + '</p></div><span class="badge ' + (assignment === "在编" || assignment === "在岗" ? "green" : "orange") + '">' + assignment + '</span></div>' +
            '<div class="inline-grid">' + tiny("营销", employee.marketing) + tiny("风控", employee.riskControl) + tiny("管理", employee.management) + tiny("忠诚", employee.loyalty) + '</div>' +
            '<div class="item-actions">' +
            '<button class="btn secondary" data-employee-id="' + employee.id + '" data-employee-op="talk">谈心</button>' +
            '<button class="btn secondary" data-employee-id="' + employee.id + '" data-employee-op="train">培训</button>' +
            '<button class="btn secondary" data-employee-id="' + employee.id + '" data-employee-op="raise">加薪</button>' +
            '<button class="btn ghost" data-employee-id="' + employee.id + '" data-employee-op="cultivate">重点培养</button>' +
            (employee.slotId ? '<button class="btn warning" data-demote-employee="' + employee.id + '">免职待岗</button>' : '') +
            '<button class="btn danger" data-employee-id="' + employee.id + '" data-employee-op="dismiss">开除</button>' +
            '</div></article>';
        }

        function openAssignModal(slotId) {
          const slot = getSlotById(state, slotId);
          if (!slot || slot.employeeId) return toast("这个岗位没有空缺。");
          const eligible = state.employees
            .filter((employee) => employee.id !== slot.employeeId)
            .sort((a, b) => {
              const aIdle = a.assignmentStatus === "待岗" ? 40 : 0;
              const bIdle = b.assignmentStatus === "待岗" ? 40 : 0;
              const aCultivate = a.status === "重点培养" ? 20 : 0;
              const bCultivate = b.status === "重点培养" ? 20 : 0;
              return (bIdle + bCultivate + b.management + b.loyalty / 2) - (aIdle + aCultivate + a.management + a.loyalty / 2);
            })
            .slice(0, 10);
          openModal({
            title: "任命：" + slot.title,
            body: "选择一名员工填补空缺。若此人原本占着其他编制，他的原岗位会同步空出来。",
            options: eligible.map((employee) => ({
              text: employee.name + " · " + employee.role + " · " + (employee.assignmentStatus || "在岗"),
              hint: "管理" + employee.management + "，忠诚" + employee.loyalty + "，状态：" + employee.status,
              action: () => {
                closeModal();
                withFeedback("任命·" + employee.name, () => employeeOperation(state, employee.id, "promote", { slotId: slot.id }));
                renderGame();
              }
            })).concat([{ text: "取消", hint: "暂不任命。", action: closeModal }])
          });
        }

        function confirmRecruitCandidate(index) {
          const candidate = state.employeePool[index];
          if (!candidate) return toast("候选人不存在。");
          const openSlot = getOpenSlots(state, candidate.role)[0];
          const body = openSlot
            ? candidate.name + "可以直接补入" + openSlot.title + "。招聘消耗3行动点和工资池" + asMoney(candidate.expectedSalary) + "。"
            : candidate.name + "对应岗位没有空缺。招聘后会进入待岗，工资照发，并增加员工风险。";
          openModal({
            title: "招聘：" + candidate.name,
            body: body,
            options: [
              {
                text: openSlot ? "招聘并上岗" : "确认招聘为待岗",
                hint: openSlot ? "直接占用空缺编制。" : "后续需要腾位、转岗或辞退。",
                action: () => {
                  if (state.actionPoints < 3) {
                    closeModal();
                    return toast("行动点不足。");
                  }
                  closeModal();
                  withFeedback("招聘·" + candidate.name, () => {
                    state.actionPoints -= 3;
                    const result = recruitCandidate(state, index, { allowIdle: true, slotId: openSlot ? openSlot.id : null });
                    saveGame(state, true);
                    return result;
                  });
                  renderGame();
                }
              },
              { text: "取消", hint: "不招聘。", action: closeModal }
            ]
          });
        }

        function renderOutlets() {
          const out = branchOutletOutput(state);
          const rent = outletMonthlyRent(state);
          const avail = availableOutletLocations(state);
          const canOpen = state.outlets.length < OUTLET_CAP && avail.length > 0;
          const cost = openOutletCost(state);
          $("panelContent").innerHTML =
            '<div class="panel-title-row"><h2>网点经营</h2><div class="panel-meta">网点产出是增长主引擎</div></div>' +
            '<article class="report-card"><div class="inline-grid">' +
            tiny("每周存款增长", round(out.deposit, 2) + "亿") + tiny("每周贷款增长", round(out.loan, 2) + "亿") + tiny("月度租金", asMoney(rent)) + tiny("网点数", state.outlets.length + "/" + OUTLET_CAP) +
            '</div>' +
            '<div class="item-actions" style="margin-top:8px"><button class="btn" id="openOutletBtn" ' + (canOpen ? "" : "disabled") + '>选址开设新网点' + (canOpen ? "（开办费" + asMoney(cost) + "）" : state.outlets.length >= OUTLET_CAP ? "（已达上限）" : "") + '</button></div>' +
            '<p class="item-subtitle" style="margin-top:6px">提升网点能力与客流，自然增长就会快很多。开新网点要贵要慢：高开办费、头几个月净亏租金慢慢爬坡，还得派二级行长。</p></article>' +
            '<div class="list outlet-list" style="margin-top:10px">' + state.outlets.map(renderOutletCard).join("") + '</div>';
          $("panelContent").querySelectorAll("[data-outlet-op]").forEach((button) => {
            button.addEventListener("click", () => {
              const outlet = state.outlets.find((o) => o.id === button.dataset.outletId);
              const opName = { market: "营销获客", manager: "整顿提能", flagship: "旗舰打造", cutCost: "压租金" }[button.dataset.outletOp] || "网点管理";
              withFeedback(opName + (outlet ? "·" + outlet.name : ""), () => outletOperation(state, button.dataset.outletId, button.dataset.outletOp));
              renderGame();
            });
          });
          const openBtn = $("panelContent").querySelector("#openOutletBtn");
          if (openBtn) openBtn.addEventListener("click", openOutletPicker);
        }

        function openOutletPicker() {
          const avail = availableOutletLocations(state);
          if (!avail.length) return toast("没有可选的新址了。");
          const cost = openOutletCost(state);
          openModal({
            title: "选址开设新网点",
            body: "开办费 " + asMoney(cost) + "（经营成本）+ 4 行动点。新网点初期产出低、净亏租金、要派二级行长，但地段潜力高，长期是产能。",
            options: avail.map((loc) => ({
              text: loc.name + " · 地段" + loc.locationPotential + " · 租金" + loc.rentCost,
              hint: loc.specialty,
              action: () => {
                closeModal();
                if (state.actionPoints < 4) return toast("行动点不足（需4点）。");
                if (state.branch.marketingBudget < cost) return toast("开办费不够（需" + asMoney(cost) + "）。");
                withFeedback("开设·" + loc.name, () => {
                  state.actionPoints -= 4;
                  const r = openOutlet(state, loc.id);
                  saveGame(state, true);
                  return r;
                });
                renderGame();
              }
            })).concat([{ text: "再等等", hint: "不消耗。", action: closeModal }])
          });
        }

        function renderOutletCard(outlet) {
          const m = getOutletManager(state, outlet);
          const out = outletWeeklyOutput(state, outlet);
          const ramping = outlet.ramp != null && outlet.ramp < 1;
          const mgrText = m ? m.name + "（管理" + m.management + "）" : "空缺，去员工页派二级行长";
          return '<article class="outlet-card">' +
            '<div class="item-head"><div><h3 class="item-title">' + outlet.name + (ramping ? ' <span class="badge orange">爬坡中</span>' : '') + '</h3><p class="item-subtitle">' + outlet.status + ' · 负责人：' + mgrText + '</p></div><span class="badge ' + (m ? "green" : "orange") + '">存款周增 ' + round(out.deposit, 2) + '亿</span></div>' +
            '<div class="inline-grid">' + tiny("能力", pct(outlet.ability)) + tiny("客流", pct(outlet.customerBase)) + tiny("地段", pct(outlet.locationPotential)) + tiny("士气", pct(outlet.morale)) + '</div>' +
            '<div class="item-actions">' +
            '<button class="btn secondary" data-outlet-id="' + outlet.id + '" data-outlet-op="market">营销获客 <small>2点·4万</small></button>' +
            '<button class="btn ghost" data-outlet-id="' + outlet.id + '" data-outlet-op="manager">整顿提能 <small>2点</small></button>' +
            '<button class="btn secondary" data-outlet-id="' + outlet.id + '" data-outlet-op="flagship">旗舰打造 <small>4点·18万</small></button>' +
            '<button class="btn ghost" data-outlet-id="' + outlet.id + '" data-outlet-op="cutCost">压租金 <small>2点</small></button>' +
            '</div></article>';
        }

        function renderRanking() {
          const rows = getRanking(state);
          const playerRow = rows.find((r) => r.isPlayer);
          const playerIdx = rows.indexOf(playerRow);
          const ahead = playerIdx > 0 ? rows[playerIdx - 1] : null;
          const gap = ahead ? round(ahead.score - playerRow.score, 1) : 0;
          const trend = (t) => t > 0 ? '<span class="rk-tr up">▲</span>' : (t < 0 ? '<span class="rk-tr down">▼</span>' : '');
          const statusTag = (st) => st === "爆雷" ? ' <span class="badge red">爆雷</span>' : (st === "猛冲" ? ' <span class="badge orange">猛冲</span>' : "");
          const list = rows.map((r) => {
            return '<div class="rank-row' + (r.isPlayer ? ' me' : '') + '">' +
              '<div class="rk-num' + (r.rank <= 3 ? ' top' : '') + '">' + r.rank + '</div>' +
              '<div class="rk-main">' +
              '<div class="rk-name">' + r.name + (r.isPlayer ? ' · 你' : '') + statusTag(r.status) + '</div>' +
              '<div class="rk-sub">行长' + r.director + ' · ' + (r.isPlayer ? '路线 ' + r.style : '打法 ' + r.style) + '</div>' +
              '</div>' +
              '<div class="rk-score">' + round(r.score, 1) + trend(r.trend) + '</div>' +
              '</div>';
          }).join("");
          const summary = ahead
            ? '你目前第 ' + playerRow.rank + ' / 9 名，距上一名（' + ahead.name + '）还差 ' + gap + ' 分'
            : '你高居榜首 · 主城九区第一，身后的人都在追';
          // 得分构成（透明化：分怎么来的）
          const bd = branchScoreBreakdown(state);
          const bdRows = bd.map((it) => {
            const cls = it.val > 0 ? 'good' : (it.val < 0 ? 'bad' : 'flat');
            const sign = it.val > 0 ? '+' : '';
            return '<div class="sb-row"><span class="sb-label">' + it.label + ' <em>' + it.weight + '</em></span>' +
              '<span class="flash-chip ' + cls + '">' + sign + it.val + '</span></div>';
          }).join("");
          // 差距换算与晋升要点
          let climb = '';
          if (ahead) {
            climb = '<p class="sb-tip">补上这 ' + gap + ' 分,约等于：存款再 +' + round(gap / 2.1, 1) + '亿，或不良率再降 ' + round(gap / 6.4, 2) + '%，或收入完成率再 +' + round(gap / 0.48, 0) + '%。</p>';
          } else {
            climb = '<p class="sb-tip">守住第一：存款贷款是最大底盘，别让不良和风险把分吃回去。</p>';
          }
          // 找出最拖后腿的项，点名提醒
          const drag = bd.filter((it) => it.val < 0).sort((a, b) => a.val - b.val)[0];
          const dragTip = drag && drag.val < -3 ? '<p class="sb-tip">当前最拖后腿：' + drag.label.split(' ')[0] + '（' + drag.val + ' 分）。' + drag.lever + '。</p>' : '';
          $("panelContent").innerHTML =
            '<div class="panel-title-row"><h2>分行排行</h2><div class="panel-meta">主城九区 · 每月更新</div></div>' +
            '<div class="rank-summary">' + summary + '</div>' +
            '<article class="report-card" style="margin-top:10px"><h3 class="item-title">你的综合分怎么来的（' + round(playerRow.score, 1) + '）</h3>' +
            '<div class="score-breakdown">' + bdRows + '</div>' + climb + dragTip +
            '<p class="sb-tip" style="color:var(--muted)">提分主杠杆：存款﹥贷款﹥收入完成率；不良率最伤分。排名是和这八家比出来的，他们也在涨。</p></article>' +
            '<div class="rank-list">' + list + '</div>';
        }

        function renderData() {
          const contacts = getContactsByGroup(state).map((contact) => {
            const level = contactKnownLevel(state, contact);
            const levelLabel = level >= 2 ? "知根知底" : level === 1 ? "略知一二" : "还摸不透";
            return '<article class="report-card"><div class="item-head"><div><h3 class="item-title">' + contact.name + '</h3><p class="item-subtitle">' + contact.group + ' · ' + contact.title + '</p></div><span class="badge gold">好感' + contact.favor + '</span></div>' +
            '<div class="inline-grid">' + tiny("影响力", contact.influence) + tiny("风险偏好", level >= 2 ? contact.riskTolerance : "？") + tiny("了解", levelLabel) + tiny("偏好", knownPreferences(state, contact)) + '</div></article>';
          }).join("");
          $("panelContent").innerHTML =
            '<div class="panel-title-row"><h2>经营数据</h2><div class="panel-meta">机会池会被队伍逐周谈成存贷款</div></div>' +
            '<div class="list">' +
            '<article class="report-card"><h3 class="item-title">支行经营</h3><div class="inline-grid">' +
            tiny("存款", round(state.branch.deposit, 2) + "亿") + tiny("贷款", round(state.branch.loan, 2) + "亿") + tiny("收入完成率", pct(state.branch.incomeRate)) + tiny("不良率", pct(state.branch.nplRate)) +
            tiny("客户机会", state.branch.customerOpportunities) + tiny("贷款机会", state.branch.loanOpportunities) + tiny("政府项目", state.branch.governmentProjects) + tiny("排名", "第" + state.branch.rank + "/9名") +
            '</div></article>' +
            '<article class="report-card"><h3 class="item-title">个人档案</h3><div class="inline-grid">' +
            tiny("道德", pct(state.player.morality)) + tiny("口才", pct(state.player.eloquence)) + tiny("酒量", pct(state.player.alcohol)) + tiny("知识", pct(state.player.knowledge)) +
            tiny("健康", pct(state.player.health)) + tiny("压力", pct(state.player.pressure)) + tiny("领导印象", pct(state.player.leaderImpression)) + tiny("路线", getDominantRoute()) +
            '</div></article></div>' +
            '<div class="panel-title-row"><h2>关系人脉</h2><div class="panel-meta">多接触、好感升高，才会慢慢摸清各人的偏好与脾性</div></div>' +
            '<div class="list staff-list">' + contacts + '</div>';
        }

        function getDominantRoute() {
          const labels = { reform: "清流改革", relation: "资源关系", wolf: "狼性冲刺", gray: "灰色江湖", official: "官场表演", survive: "摆烂苟活" };
          const key = Object.keys(state.routeScores).sort((a, b) => state.routeScores[b] - state.routeScores[a])[0];
          return labels[key] || "未定";
        }

        function renderRisks() {
          const overall = getOverallRiskStatus(state);
          const keys = Object.keys(state.hiddenRisks);
          const visibleCount = keys.filter((k) => isRiskVisible(state, k)).length;
          $("panelContent").innerHTML =
            '<div class="panel-title-row"><h2>风控</h2><div class="panel-meta">体感：' + overall.label + '</div></div>' +
            '<article class="report-card"><p class="item-body">这些是潜在隐患，平时藏在水面下，只能凭整体<strong>体感</strong>（当前：<span class="badge ' + overall.tone + '">' + overall.label + '</span>）。想看清某一项的深浅，要做对应的<strong>自查/排查</strong>行动；查清后会保持清晰约' + REVEAL_WEEKS + '周，之后重新变模糊。当前看得清 ' + visibleCount + '/' + keys.length + ' 项。</p></article>' +
            '<div class="risk-grid" style="margin-top:10px">' + keys.map((key) => renderRiskRow(key, state.hiddenRisks[key])).join("") + '</div>';
        }

        function renderRiskRow(key, value) {
          const visible = isRiskVisible(state, key);
          if (!visible) {
            return '<article class="risk-row"><div class="risk-head"><span>' + RISK_NAMES[key] + '</span><span class="badge">未排查</span></div>' +
              '<div class="risk-track"><div class="risk-fill" style="width:100%;background:repeating-linear-gradient(45deg,#e6ebf2,#e6ebf2 6px,#eef3f8 6px,#eef3f8 12px)"></div></div>' +
              '<p class="item-subtitle" style="margin:4px 0 0">' + (RISK_SCOUT_HINT[key] || "需自查才看得清") + '</p></article>';
          }
          const band = riskBand(value);
          const left = riskIntelLeft(state, key);
          const freshness = key === "health" ? "凭身体直觉" : (left > 0 ? "清晰 · 约" + left + "周后变模糊" : "情报刚过期");
          return '<article class="risk-row"><div class="risk-head"><span>' + RISK_NAMES[key] + '</span><span class="badge ' + band.tone + '">' + band.label + '</span></div>' +
            '<p class="item-subtitle" style="margin:4px 0 0">' + freshness + '</p></article>';
        }

        function renderReports() {
          const quarters = state.quarterlyResults.length ? state.quarterlyResults.map((report) => (
            '<article class="report-card"><h3 class="item-title">第' + report.year + '年 第' + report.quarter + '季度：' + report.result + '</h3><p class="item-body">得分' + report.score + '，排名第' + report.rank + '名。</p></article>'
          )).join("") : '<div class="empty">还没有季度考核。</div>';
          const years = state.yearlyResults.length ? state.yearlyResults.map((report) => (
            '<article class="report-card"><h3 class="item-title">第' + report.year + '年：' + report.grade + '</h3><p class="item-body">年度得分' + report.score + '，排名第' + report.rank + '名。</p></article>'
          )).join("") : '<div class="empty">还没有年度考核。</div>';
          const months = state.monthlyReports.length ? state.monthlyReports.slice(0, 4).map((report) => (
            '<article class="report-card"><h3 class="item-title">' + report.title + '</h3><p class="item-body">存款' + report.deposit + '亿，贷款' + report.loan + '亿，收入' + report.incomeRate + '%，不良' + report.nplRate + '%，排名第' + report.rank + '名，风险' + report.risk + '。</p></article>'
          )).join("") : '<div class="empty">还没有月度小结。</div>';
          $("panelContent").innerHTML =
            '<div class="panel-title-row"><h2>考核通报</h2><div class="panel-meta">月度、季度、年度</div></div>' +
            '<div class="panel-title-row"><h2>月度</h2></div><div class="list">' + months + '</div>' +
            '<div class="panel-title-row"><h2>季度</h2></div><div class="list">' + quarters + '</div>' +
            '<div class="panel-title-row"><h2>年度</h2></div><div class="list">' + years + '</div>';
        }

        function renderLogs() {
          $("panelContent").innerHTML =
            '<div class="panel-title-row"><h2>游戏日志</h2><div class="panel-meta">最近' + state.logs.length + '条</div></div>' +
            '<div class="list">' + (state.logs.length ? state.logs.map((log) => (
              '<article class="log-row"><strong>第' + log.week + '周 · ' + log.title + '</strong><p>' + log.text + '</p></article>'
            )).join("") : '<div class="empty">暂无日志。</div>') + '</div>';
        }

        function renderSave() {
          const saved = state.lastSavedAt ? new Date(state.lastSavedAt).toLocaleString("zh-CN") : "尚未保存";
          $("panelContent").innerHTML =
            '<div class="panel-title-row"><h2>存档管理</h2><div class="panel-meta">' + saved + '</div></div>' +
            '<article class="save-card"><h3 class="item-title">江北区支行任期档案</h3><p class="item-body">当前第' + state.week + '周，排名第' + state.branch.rank + '名，总风险状态：' + getOverallRiskStatus(state).label + '。</p>' +
            '<div class="item-actions"><button id="manualSavePanelBtn" class="btn">手动保存</button><button id="deleteSaveBtn" class="btn danger">删除存档</button><button id="newRunPanelBtn" class="btn secondary">重新开局</button></div></article>';
          $("manualSavePanelBtn").addEventListener("click", () => {
            saveGame(state, false);
            renderGame();
          });
          $("deleteSaveBtn").addEventListener("click", () => {
            openModal({
              title: "删除存档",
              body: "删除后，当前任期记录不会再出现在继续游戏里。",
              options: [
                { text: "删除", hint: "保留当前页面状态，但移除本地存档。", action: () => { deleteSave(); closeModal(); renderHome(); toast("存档已删除"); } },
                { text: "取消", hint: "不改变存档。", action: closeModal }
              ]
            });
          });
          $("newRunPanelBtn").addEventListener("click", () => {
            openModal({
              title: "重新开局",
              body: "新的任命会覆盖当前任期记录。",
              options: [
                { text: "重新开局", hint: "覆盖当前存档。", action: startNewGame },
                { text: "取消", hint: "继续当前任期。", action: closeModal }
              ]
            });
          });
        }

        function renderEnding() {
          setScreen("endingScreen");
          $("endingTitle").textContent = state.ending.title;
          $("endingText").textContent = state.ending.text;
          const stats = [
            ["最终排名", "第" + state.branch.rank + "名", "江北区支行三年终局"],
            ["存款规模", round(state.branch.deposit, 2) + "亿", "初始18亿"],
            ["贷款规模", round(state.branch.loan, 2) + "亿", "初始12亿"],
            ["收入完成率", pct(state.branch.incomeRate), "年度经营口径"],
            ["不良率", pct(state.branch.nplRate), "越低越稳"],
            ["总风险", getOverallRiskStatus(state).label, "最高：" + RISK_NAMES[getMaxRiskKey(state)]]
          ];
          $("endingStats").innerHTML = stats.map(([name, value, note]) => (
            '<article class="metric-card"><div class="metric-name">' + name + '</div><div class="metric-value">' + value + '</div><div class="metric-note">' + note + '</div></article>'
          )).join("");
          renderHome();
        }

        function tiny(label, value) {
          return '<div class="tiny-stat"><span>' + label + '</span><strong>' + value + '</strong></div>';
        }

        function openModal(config) {
          $("modalTitle").textContent = config.title;
          $("modalBody").innerHTML = config.body;
          $("modalOptions").innerHTML = config.options.map((option, index) => (
            '<button class="option-btn" data-option-index="' + index + '">' + option.text + (option.hint ? '<small>' + option.hint + '</small>' : "") + '</button>'
          )).join("");
          $("modalRoot").classList.remove("hidden");
          $("modalOptions").querySelectorAll("button").forEach((button) => {
            button.addEventListener("click", () => config.options[Number(button.dataset.optionIndex)].action());
          });
        }

        function closeModal() {
          $("modalRoot").classList.add("hidden");
          $("modalTitle").textContent = "";
          $("modalBody").innerHTML = "";
          $("modalOptions").innerHTML = "";
        }

        function showNextEventIfAny() {
          if (!state || !state.pendingEvents.length) return;
          const eventId = state.pendingEvents[0];
          const event = EVENTS.find((item) => item.id === eventId);
          if (!event) {
            state.pendingEvents.shift();
            return;
          }
          openModal({
            title: event.title,
            body: event.description,
            options: event.options.map((option, index) => ({
              text: option.text,
              hint: option.hint,
              action: () => {
                chooseEventOption(state, event.id, index);
                closeModal();
                renderGame();
                showNextEventIfAny();
              }
            }))
          });
        }

        function toast(message) {
          openModal({
            title: "提示",
            body: message,
            options: [{ text: "知道了", hint: "", action: closeModal }]
          });
        }

        // ===== 行动即时反馈 =====
        var FB_BRANCH = {
          deposit: { n: "存款", u: "亿", d: 2 }, loan: { n: "贷款", u: "亿", d: 2 },
          incomeRate: { n: "收入率", u: "%", d: 1 }, nplRate: { n: "不良率", u: "%", d: 2, inv: true },
          morale: { n: "士气", u: "", d: 1 }, teamAbility: { n: "团队能力", u: "", d: 1 },
          salaryPool: { n: "工资池", u: "万", d: 1 }, marketingBudget: { n: "经营成本", u: "万", d: 1 },
          localRelation: { n: "地方关系", u: "", d: 1 },
          customerOpportunities: { n: "客户机会", u: "", d: 0 }, loanOpportunities: { n: "贷款机会", u: "", d: 0 },
          governmentProjects: { n: "政府项目", u: "", d: 0 }
        };
        var FB_PLAYER = {
          leaderImpression: { n: "领导印象" }, health: { n: "健康" }, pressure: { n: "压力", inv: true },
          eloquence: { n: "口才" }, alcohol: { n: "酒量" }, knowledge: { n: "知识" }, morality: { n: "道德" }
        };

        function snapshotStats(s) {
          const snap = { ap: s.actionPoints, rank: s.branch.rank, branch: {}, player: {}, risks: {} };
          Object.keys(FB_BRANCH).forEach((k) => { snap.branch[k] = s.branch[k]; });
          Object.keys(FB_PLAYER).forEach((k) => { snap.player[k] = s.player[k]; });
          Object.keys(s.hiddenRisks).forEach((k) => { snap.risks[k] = s.hiddenRisks[k]; });
          return snap;
        }

        function fmtDelta(cfg, delta) {
          const v = round(delta, cfg.d || 0);
          const sign = v > 0 ? "+" : "";
          const good = cfg.inv ? v < 0 : v > 0;
          return { text: cfg.n + " " + sign + v + (cfg.u || ""), cls: good ? "good" : "bad" };
        }

        function diffStats(before, after) {
          const chips = [];
          if (after.ap !== before.ap) chips.push({ text: "行动点 " + (after.ap - before.ap), cls: "flat" });
          Object.keys(FB_BRANCH).forEach((k) => {
            const dv = after.branch[k] - before.branch[k];
            if (Math.abs(dv) >= (FB_BRANCH[k].d ? 0.005 : 0.5)) chips.push(fmtDelta(FB_BRANCH[k], dv));
          });
          Object.keys(FB_PLAYER).forEach((k) => {
            const dv = after.player[k] - before.player[k];
            if (Math.abs(dv) >= 0.5) chips.push(fmtDelta(FB_PLAYER[k], dv));
          });
          if (after.rank !== before.rank) {
            chips.push({ text: "排名 " + (after.rank < before.rank ? "↑第" + after.rank : "↓第" + after.rank) + "名", cls: after.rank < before.rank ? "good" : "bad" });
          }
          // 隐患：只给方向，不泄露数值
          Object.keys(after.risks).forEach((k) => {
            const dv = after.risks[k] - before.risks[k];
            if (Math.abs(dv) >= 1) chips.push({ text: RISK_NAMES[k] + "风险 " + (dv > 0 ? "↑" : "↓"), cls: dv > 0 ? "bad" : "good" });
          });
          return chips;
        }

        function flashResult(title, narrative, chips) {
          let wrap = document.getElementById("flashWrap");
          if (!wrap) { wrap = document.createElement("div"); wrap.id = "flashWrap"; wrap.className = "flash-wrap"; document.body.appendChild(wrap); }
          const card = document.createElement("div");
          card.className = "flash-card";
          card.innerHTML = '<div class="flash-title">' + title + '</div>' +
            (narrative ? '<div class="flash-narr">' + narrative + '</div>' : '') +
            (chips.length ? '<div class="flash-deltas">' + chips.map((c) => '<span class="flash-chip ' + c.cls + '">' + c.text + '</span>').join("") + '</div>' : '<div class="flash-deltas"><span class="flash-chip flat">没有明显变化</span></div>');
          const remove = () => { card.classList.add("fading"); setTimeout(() => { if (card.parentNode) card.parentNode.removeChild(card); }, 380); };
          card.addEventListener("click", remove);
          wrap.appendChild(card);
          while (wrap.children.length > 3) wrap.removeChild(wrap.firstChild);
          setTimeout(remove, 5200);
        }

        function withFeedback(title, fn) {
          const before = snapshotStats(state);
          const result = fn();
          if (result && result.ok === false) { toast(result.message); return result; }
          const narrative = state.logs && state.logs[0] ? state.logs[0].text : "";
          flashResult(title, narrative, diffStats(before, snapshotStats(state)));
          return result;
        }

        return {
          start,
          renderGame,
          startNewGame
        };
      })();

      window.BankGameApp = App;

      if (typeof document !== "undefined" && document.addEventListener) {
        document.addEventListener("DOMContentLoaded", App.start);
      }
    })();
  </script>
</body>
</html>
